key: mine_fge
type: minecraft:item
tags: [ deployable ]
pathfinding:
  type: proxima.path_settings.ground
  jumpHeight: 0
  fallTolerance: 0
  stepHeight: 0

meta:
  customName: <gray>Mine</gray>
  isGlowing: true
  itemStack:
    material: minecraft:cobblestone

extra:
  bypassEndlessScaling: true
  resistFire: true
  ticksUntilDeath: 400
  partOfRound: false

attributes:
  generic.max_health: 10
  generic.movement_speed: 0

skills:
  - type: mob.skill.play_sound
    trigger: DEATH
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.generic.explode', source: HOSTILE, volume: 1.5, pitch: 1.0 }

  - type: mob.skill.radial_damage
    trigger: DEATH
    selector:
      type: mob.selector.entities_in_area
      originSelector:
        type: mob.selector.self
      range: 5
      target: PLAYERS
      validator: /alivePlayers
    damage: 7
    knockback: 0.2
    damageType: damage.explosion
    bypassArmor: true
    range: 5

  - type: mob.skill.timer
    interval: 2
    delegate:
      type: mob.skill.conditional
      condition:
        type: mob.skill.condition.distance
        originSelector:
          type: mob.selector.self
        targetSelector:
          type: mob.selector.entities_in_area
          originSelector:
            type: mob.selector.self
          range: 2
          target: PLAYERS
          validator: /alivePlayers
        distance: 2
      delegate:
        type: mob.skill.damage
        selector:
          type: mob.selector.self
        amount: 10

alivePlayers:
  type: zombies.mob.validator.zombies_player
  states: [ zombies.player.state.alive ]
  blacklist: false