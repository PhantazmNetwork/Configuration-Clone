key: banshee_rip
type: minecraft:zombie
pathfinding:

  type: proxima.path_settings.ground
  jumpHeight: 1.5
  fallTolerance: 8
  stepHeight: 1

meta:
  customName: <gray>Banshee</gray>

equipment:
  BOOTS: '{id:"leather_boots",Count:1,tag:{display:{color:16777215}}}'
  LEGGINGS: '{id:"chainmail_leggings",Count:1}'
  CHESTPLATE: '{id:"leather_chestplate",Count:1,tag:{display:{color:16777215}}}'
  HELMET: '{id:"chainmail_helmet",Count:1}'

attributes:
  generic.max_health: 35
  generic.movement_speed: 0.28
  generic.attack_damage: 4
  generic.armor: 6
  generic.attack_knockback: 0.2

skills:
  - type: mob.skill.play_sound
    trigger: DAMAGED
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.zombie.hurt', source: HOSTILE, volume: 1.5, pitch: 1.0 }

  - type: mob.skill.play_sound
    trigger: DEATH
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.ghast.death', source: HOSTILE, volume: 1.5, pitch: 1.0 }

  - type: mob.skill.random_timer
    minInterval: 100
    maxInterval: 160
    delegate:
      type: mob.skill.random
      chance: 0.5
      delegate:
        type: mob.skill.play_sound
        selector:
          type: mob.selector.self
        sound: { name: 'minecraft:entity.zombie.ambient', source: HOSTILE, volume: 1.5, pitch: 1.0 }

  - type: mob.skill.timer
    interval: 100
    delegate:
      type: mob.skill.group
      delegates:
        - type: mob.skill.temporal
          minDuration: 20
          maxDuration: 30
          delegate:
            type: mob.skill.attribute_modifying
            attribute: generic.movement_speed
            amount: 0.5
            attributeOperation: ADDITION
            selector:
              type: mob.selector.self

        - type: mob.skill.leap
          strength: 30
          angle: 15
          selector:
            type: mob.selector.pathfinding_target

        - type: mob.skill.play_sound
          selector:
            type: mob.selector.self
          sound: { name: 'minecraft:entity.ghast.hurt', source: HOSTILE, volume: 1.5, pitch: 1.0 }

goals:
  - type: mob.goal_applier.collection
    goalCreators:
      - type: zombies.mob.goal.break_window
        breakTicks: 20
        breakCount: 1
        breakRadius: 0.5

  - type: mob.goal_applier.collection
    goalCreators:
      - type: mob.goal.melee_attack
        cooldown: 17
        range: 0.25

      - type: mob.goal.follow_entity
        selector:
          type: mob.selector.entities_in_area
          originSelector:
            type: mob.selector.self
          validator: /alivePlayers
          target: PLAYERS
          limit: 1
        retargetInterval: 20
        followRange: 1024

alivePlayers:
  type: zombies.mob.validator.zombies_player
  states: [ zombies.player.state.alive ]
  blacklist: false