round: 26
startActions:
  - type: zombies.map.round.action.announce
    format: <red>Round <round>
    destination: TITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.announce
    format: ""
    destination: SUBTITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.revive_players

  - type: zombies.map.round.action.play_sound
    sound: { name: 'minecraft:entity.wither.spawn', source: MASTER, volume: 24.0,
             pitch: 0.5 }
endActions: [ ]
# 70
waves:
  - delayTicks: 120
    spawns:
      - id: mutant
        spawnType: window
        amount: 4
      - id: glower
        spawnType: window
        amount: 18
    spawnActions: [ ]
  - delayTicks: 250
    spawns:
      - id: mutant
        spawnType: window
        amount: 4
      - id: dried_undead
        spawnType: window
        amount: 17
    spawnActions: [ ]
  - delayTicks: 270
    spawns:
      - id: mutant
        spawnType: window
        amount: 8
      - id: spitter
        spawnType: window
        amount: 19
    spawnActions:
      - type: zombies.map.wave.action.select_powerup
        powerups: [ "max_ammo" ]