        - '<!i><#616575>»</#616575> <#9096ad>Damage rate</#9096ad><#b8bfde>:</#b8bfde> <green>4/s</green></!i>'
        - '<!i><#616575>»</#616575> <#9096ad>Damage increase</#9096ad><#b8bfde>:</#b8bfde> <green>+100%</green></!i>'
        - '<!i><#616575>»</#616575> <#9096ad>Health reduction</#9096ad><#b8bfde>:</#b8bfde> <red>-75%</red></!i>'
