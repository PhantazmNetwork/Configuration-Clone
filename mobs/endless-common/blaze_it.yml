key: blaze_it
type: minecraft:blaze
tags: [ endless, fire_res, fire, troll]
pathfinding:
  type: proxima.path_settings.ground
  jumpHeight: 1.5
  fallTolerance: 6
  stepHeight: 1.0
  targetDeviation: 10

meta:
  customName: <gradient:#ff0303:#ff7c02>Blaze It</gradient>

extra:
  resistFire: true

attributes:
  generic.max_health: 40
  generic.movement_speed: 0.24
  generic.attack_damage: 3
  generic.armor: 0
  generic.attack_knockback: 0.2

skills:
  - type: mob.skill.play_sound
    trigger: DAMAGED
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.blaze.hurt', source: HOSTILE, volume: 1.5, pitch: 1.0 }

  - type: mob.skill.play_sound
    trigger: DEATH
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.blaze.death', source: HOSTILE, volume: 1.5, pitch: 1.0 }

  - type: mob.skill.random_timer
    minInterval: 100
    maxInterval: 160
    delegate:
      type: mob.skill.random
      chance: 0.5
      delegate:
        type: mob.skill.play_sound
        selector:
          type: mob.selector.self
        sound: { name: 'minecraft:entity.blaze.ambient', source: HOSTILE, volume: 1.5, pitch: 1.0 }

  - type: mob.skill.random_timer
    minInterval: 100
    maxInterval: 160
    delegate:
      type: mob.skill.random
      chance: 0.5
      delegate:
        type: mob.skill.play_sound
        selector:
          type: mob.selector.self
        sound: { name: 'minecraft:entity.blaze.burn', source: HOSTILE, volume: 1.5, pitch: 1.0 }

  - type: mob.skill.timer
    interval: 50
    delegate:
      type: mob.skill.group
      delegates:
        - type: mob.skill.group
          delegates:
            - type: mob.skill.shoot_projectile
              selector:
                type: mob.selector.pathfinding_target
              hitValidator:
                type: mob.validator.and
                validators: [ /alivePlayers, /distanceCheck ]
              callback:
                type: mob.skill.spawn_mob.callback.none
              entity: dee_oh_double_g
              power: 1.2
              spread: 0
              gravity: false

            - type: mob.skill.play_sound
              selector:
                type: mob.selector.self
              sound: { name: 'minecraft:entity.blaze.shoot', source: HOSTILE, volume: 1.5, pitch: 1.0 }

            - type: mob.skill.timer
              repeat: 1
              interval: 10
              requiresActivation: true
              delegate:
                type: mob.skill.group
                delegates:
                  - type: mob.skill.shoot_projectile
                    selector:
                      type: mob.selector.pathfinding_target
                    hitValidator:
                      type: mob.validator.and
                      validators: [ /alivePlayers, /distanceCheck ]
                    callback:
                      type: mob.skill.spawn_mob.callback.none
                    entity: dee_oh_double_g
                    power: 1.2
                    spread: 0
                    gravity: false

                  - type: mob.skill.play_sound
                    selector:
                      type: mob.selector.self
                    sound: { name: 'minecraft:entity.blaze.shoot', source: HOSTILE, volume: 1.5, pitch: 1.0 }

            - type: mob.skill.timer
              repeat: 1
              interval: 20
              requiresActivation: true
              delegate:
                type: mob.skill.group
                delegates:
                  - type: mob.skill.shoot_projectile
                    selector:
                      type: mob.selector.pathfinding_target
                    hitValidator:
                      type: mob.validator.and
                      validators: [ /alivePlayers, /distanceCheck ]
                    callback:
                      type: mob.skill.spawn_mob.callback.none
                    entity: dee_oh_double_g
                    power: 1.2
                    spread: 0
                    gravity: false

                  - type: mob.skill.play_sound
                    selector:
                      type: mob.selector.self
                    sound: { name: 'minecraft:entity.blaze.shoot', source: HOSTILE, volume: 1.5, pitch: 1.0 }

  - type: mob.skill.timer
    interval: 50
    delegate:
      type: mob.skill.shoot_projectile
      selector:
        type: mob.selector.pathfinding_target
      hitValidator:
        type: mob.validator.and
        validators: [ /alivePlayers, /distanceCheck ]
      callback:
        type: mob.skill.spawn_mob.callback.none
      entity: spit_projectile
      power: 1.2
      spread: 0
      gravity: false

goals:
  - type: mob.goal_applier.collection
    goalCreators:
      - type: zombies.mob.goal.break_window
        breakTicks: 20
        breakCount: 1
        breakRadius: 0.5

  - type: mob.goal_applier.collection
    goalCreators:
      - type: mob.goal.follow_entity
        selector:
          type: mob.selector.entities_in_area
          originSelector:
            type: mob.selector.self
          validator: /alivePlayers
          target: PLAYERS
          limit: 1
        retargetInterval: 20
        followRange: 1024

alivePlayers:
  type: zombies.mob.validator.zombies_player
  states: [ zombies.player.state.alive ]
  blacklist: false

distanceCheck:
  type: mob.validator.distance
  distance: 13