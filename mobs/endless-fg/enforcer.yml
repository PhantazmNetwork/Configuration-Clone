key: enforcer_fge
type: minecraft:zombie
tags: [ endless, cop ]
pathfinding:
  type: proxima.path_settings.ground
  jumpHeight: 1.25
  fallTolerance: 4
  stepHeight: 0.5

meta:
  customName: <blue>Enforcer</blue>

equipment:
  MAIN_HAND: '{id:"stick",Count:1}'
  OFF_HAND: '{id:"stick",Count:1}'
  BOOTS: '{id:"leather_boots",Count:1,tag:{display:{color:0}}}'
  LEGGINGS: '{id:"leather_leggings",Count:1,tag:{display:{color:1320030}}}'
  CHESTPLATE: '{id:"leather_chestplate",Count:1,tag:{display:{color:1320030}}}'
  HELMET: '{id:"player_head",Count:1,tag:{display:{Name:"{\"text\":\"Police Officer\"}"},SkullOwner:{Id:[I;306904007,92555490,-1087339866,2045212547],Properties:{textures:[{Value:"eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvOWI2MWMyYzAyZTUzZWY5NjczMTA1MjhmODhkOTU5NDNjYjhhYjkyZTQxMDAxODkzMDVkNzM0NzQ1ODFjY2IzMCJ9fX0="}]}}}}'

attributes:
  generic.max_health: 35
  generic.movement_speed: 0.23
  generic.attack_damage: 6
  generic.armor: 12
  generic.attack_knockback: 0.7

skills:
  - type: mob.skill.play_sound
    trigger: DAMAGED
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.zombie.hurt', source: HOSTILE, volume: 1.5, pitch: 0.8 }

  - type: mob.skill.play_sound
    trigger: DEATH
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.zombie.death', source: HOSTILE, volume: 1.5, pitch: 0.8 }

  - type: mob.skill.random_timer
    minInterval: 100
    maxInterval: 160
    delegate:
      type: mob.skill.random
      chance: 0.5
      delegate:
        type: mob.skill.play_sound
        selector:
          type: mob.selector.self
        sound: { name: 'minecraft:entity.zombie.ambient', source: HOSTILE, volume: 1.5, pitch: 0.8 }

goals:
  - type: mob.goal_applier.collection
    goalCreators:
      - type: zombies.mob.goal.break_window
        breakTicks: 30
        breakCount: 2
        breakRadius: 0.5

  - type: mob.goal_applier.collection
    goalCreators:
      - type: mob.goal.melee_attack
        cooldown: 15
        range: 0.25

      - type: mob.goal.follow_entity
        selector:
          type: mob.selector.entities_in_area
          originSelector:
            type: mob.selector.self
          validator:
            type: mob.validator.or
            validators: [ /alivePlayers, /targetableMobs ]
          target: LIVING_ENTITIES
          limit: 1
        retargetInterval: 20
        followRange: 1024

alivePlayers:
  type: zombies.mob.validator.zombies_player
  states: [ zombies.player.state.alive ]
  blacklist: false

targetableMobs:
  type: mob.validator.mob_type
  tags: [ ally_targetable ]
  blacklist: false