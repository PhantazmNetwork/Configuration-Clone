key: spit_infernal
type: minecraft:llama_spit
pathfinding:
  type: proxima.path_settings.ground
  jumpHeight: 0
  fallTolerance: 0
  stepHeight: 0

meta:
  customName: <green>Spitter</green>

extra:
  ticksUntilDeath: 200

skills:
  - type: mob.skill.damage
    trigger: ATTACK
    selector:
      type: mob.selector.last_hit
    amount: 4
    bypassArmor: true
    knockback: 0.2

  - type: mob.skill.damage
    trigger: DEATH
    selector:
      type: mob.selector.entities_in_area
      originSelector:
        type: mob.selector.self
      range: 2.5
      target: LIVING_ENTITIES
      validator: /alivePlayers
    amount: 4
    bypassArmor: true

  - type: mob.skill.play_sound
    trigger: DEATH
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.llama.spit', source: HOSTILE, volume: 2.0, pitch: 1.5 }

  - type: mob.skill.spawn_particle
    trigger: DEATH
    selector:
      type: mob.selector.self
    particle:
      type: particle.wrapper
      particle: spit
      variantData:
        type: particle.variant_data.none
      distance: true
      offsetX: 1.0
      offsetY: 1.0
      offsetZ: 1.0
      data: 0.0
      particleCount: 15
    bounds:
      origin:
        x: -1.0
        y: 0.5
        z: -1.0
      lengths:
        x: 1.0
        y: 1.0
        z: 1.0

alivePlayers:
  type: zombies.mob.validator.zombies_player
  states: [ zombies.player.state.alive ]
  blacklist: false