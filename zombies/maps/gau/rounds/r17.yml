round: 17
startActions:
  - type: zombies.map.round.action.announce
    format: <red>Round <round>
    destination: TITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.announce
    format: ""
    destination: SUBTITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.revive_players

  - type: zombies.map.round.action.play_sound
    sound: { name: 'minecraft:entity.wither.spawn', source: MASTER, volume: 24.0,
             pitch: 0.5 }
endActions: [ ]
# 59
waves:
  - delayTicks: 140
    spawns:
      - id: hazmat_zombie
        spawnType: window
        amount: 14
    spawnActions:
      - type: zombies.map.wave.action.select_powerup
        powerups: [ "insta_kill" ]
  - delayTicks: 270
    spawns:
      - id: hazmat_zombie
        spawnType: window
        amount: 9
      - id: crazed_zombie
        spawnType: window
        amount: 10
    spawnActions: [ ]
  - delayTicks: 240
    spawns:
      - id: hazmat_zombie
        spawnType: window
        amount: 6
      - id: crazed_zombie
        spawnType: window
        amount: 9
      - id: dried_undead
        spawnType: window
        amount: 9
    spawnActions: [ ]