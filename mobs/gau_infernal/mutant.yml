key: mutant_infernal
type: minecraft:zombie
pathfinding:
  type: proxima.path_settings.ground
  jumpHeight: 1.25
  fallTolerance: 4
  stepHeight: 0.5

meta:
  customName: <dark_green>Mutant</dark_green>

extra:
  resistInstakill: true
  resistFire: true
  resistSlowDown: true

equipment:
  BOOTS: '{id:"netherite_boots",Count:1}'
  LEGGINGS: '{id:"leather_leggings",Count:1,tag:{display:{color:3889688}}}'
  CHESTPLATE: '{id:"netherite_chestplate",Count:1}'
  HELMET: '{id:"player_head",Count:1,tag:{display:{Name:"{\"text\":\"Zombie\"}"},SkullOwner:{Id:[I;1970988151,-1642444990,-2146357188,972381987],Properties:{textures:[{Value:"eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvODBlYThkMjM4ZTA1YzU0Njc3NGRlMGJlODc1NjZkNzBkMjBjMjUxZTNhYzEzOWFmMzE4Zjg2OTdhMjMyNzI3NiJ9fX0="}]}}}}'

attributes:
  generic.max_health: 200
  generic.movement_speed: 0.38
  generic.attack_damage: 11
  generic.armor: 18
  generic.attack_knockback: 0.3
  phantazm.gun_headshot_damage_received: 0.75

skills:
  - type: mob.skill.play_sound
    trigger: DAMAGED
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.zombie.hurt', source: HOSTILE, volume: 1.5, pitch: 1.0 }

  - type: mob.skill.play_sound
    trigger: DEATH
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.zombie.death', source: HOSTILE, volume: 1.5, pitch: 1.0 }

  - type: mob.skill.random_timer
    minInterval: 100
    maxInterval: 160
    delegate:
      type: mob.skill.random
      chance: 0.5
      delegate:
        type: mob.skill.play_sound
        selector:
          type: mob.selector.self
        sound: { name: 'minecraft:entity.zombie.ambient', source: HOSTILE, volume: 1.5, pitch: 1.0 }

goals:
  - type: mob.goal_applier.collection
    goalCreators:
      - type: zombies.mob.goal.break_window
        breakTicks: 15
        breakCount: 2
        breakRadius: 0.5

  - type: mob.goal_applier.collection
    goalCreators:
      - type: mob.goal.melee_attack
        cooldown: 15
        range: 0.25

      - type: mob.goal.follow_entity
        selector:
          type: mob.selector.entities_in_area
          originSelector:
            type: mob.selector.self
          validator: /alivePlayers
          target: PLAYERS
          limit: 1
        retargetInterval: 20
        followRange: 1024

alivePlayers:
  type: zombies.mob.validator.zombies_player
  states: [ zombies.player.state.alive ]
  blacklist: false