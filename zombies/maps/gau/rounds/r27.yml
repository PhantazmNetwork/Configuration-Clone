round: 27
startActions:
  - type: zombies.map.round.action.announce
    format: <red>Round <round>
    destination: TITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.announce
    format: ""
    destination: SUBTITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.revive_players

  - type: zombies.map.round.action.play_sound
    sound: { name: 'minecraft:entity.wither.spawn', source: MASTER, volume: 24.0,
             pitch: 0.5 }
endActions: [ ]
# 86
waves:
  - delayTicks: 150
    spawns:
      - id: glower
        spawnType: window
        amount: 9
      - id: dried_undead
        spawnType: window
        amount: 9
      - id: spitter
        spawnType: window
        amount: 12
    spawnActions: [ ]
  - delayTicks: 260
    spawns:
      - id: glower
        spawnType: window
        amount: 7
      - id: dried_undead
        spawnType: window
        amount: 9
      - id: spitter
        spawnType: window
        amount: 10
    spawnActions: [ ]
  - delayTicks: 280
    spawns:
      - id: dried_undead
        spawnType: window
        amount: 8
      - id: spitter
        spawnType: window
        amount: 12
