round: 21
startActions:
  - type: zombies.map.round.action.announce
    format: <red>Round <round>
    destination: TITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.announce
    format: ""
    destination: SUBTITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.revive_players

  - type: zombies.map.round.action.play_sound
    sound: { name: 'minecraft:entity.wither.spawn', source: MASTER, volume: 24.0,
             pitch: 0.5 }
endActions: [ ]
# 66
waves:
  - delayTicks: 140
    spawns:
      - id: glower
        spawnType: window
        amount: 18
    spawnActions: [ ]
  - delayTicks: 250
    spawns:
      - id: glower
        spawnType: window
        amount: 10
      - id: dried_undead
        spawnType: window
        amount: 10
    spawnActions:
      - type: zombies.map.wave.action.select_powerup
        powerups: [ "max_ammo" ]
  - delayTicks: 230
    spawns:
      - id: glower
        spawnType: window
        amount: 13
      - id: dried_undead
        spawnType: window
        amount: 15
    spawnActions: [ ]