# mechanically unfinished
key: senior_engineer
type: minecraft:drowned
pathfinding:
  type: proxima.path_settings.ground
  jumpHeight: 1.75
  fallTolerance: 8
  stepHeight: 1.25

showNameTag: true

meta:
  customName: <#742d04><b>Senior Engineer</b></#742d04>
  customNameVisible: true

extra:
  resistInstakill: true
  announceKill: true

equipment:
  OFF_HAND: '{id:"bone",Count:1}'
  MAIN_HAND: '{id:"lightning_rod",Count:1}'
  BOOTS: '{id:"leather_boots",Count:1,tag:{display:{color:7613700}}}'
  LEGGINGS: '{id:"leather_leggings",Count:1,tag:{display:{color:7613700}}}'
  CHESTPLATE: '{id:"leather_chestplate",Count:1,tag:{display:{color:7613700}}}'
  HELMET: '{id:"player_head",Count:1,tag:{display:{Name:"{\"text\":\"Mechanic\"}"},SkullOwner:{Id:[I;1348936302,2131970044,-1416818425,-2140271418],Properties:{textures:[{Value:"eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvODZhZWE5ZmQ0OGM3MzAzMDNhMWI5M2NjNTBmM2RiMmEwNTI1MTU2YTJkMGMwMWY1MjIyMjE0NmExMTFlZTQ3MiJ9fX0="}]}}}}'

attributes:
  generic.max_health: 600
  generic.movement_speed: 0.2
  generic.attack_damage: 5
  generic.armor: 10
  generic.attack_knockback: 0.3

skills:
  - type: mob.skill.send_message
    trigger: SPAWN
    message: <yellow><#742d04><b>Senior Engineer</b></#742d04> has spawned!</yellow>
    selector:
      type: mob.selector.entities_in_area
      originSelector:
        type: mob.selector.self
      validator:
        type: mob.validator.always
      target: PLAYERS

  - type: mob.skill.play_sound
    trigger: SPAWN
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.lightning_bolt.thunder', source: PLAYER, volume: 100.0, pitch: 1.0 }

  - type: mob.skill.play_sound
    trigger: DAMAGED
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.drowned.hurt', source: HOSTILE, volume: 1.5, pitch: 0.5 }

  - type: mob.skill.play_sound
    trigger: DEATH
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.drowned.death', source: HOSTILE, volume: 1.5, pitch: 0.5 }

  - type: mob.skill.show_healthbar
    bar: '<#6b6f80>[<healthbar:bar_component:|:color_start:#dd3e28:color_end:#34bf25:missing_color:gray>]</#6b6f80>'
    barWidth: 20

  - type: mob.skill.random_timer
    minInterval: 100
    maxInterval: 160
    delegate:
      type: mob.skill.random
      chance: 0.5
      delegate:
        type: mob.skill.play_sound
        selector:
          type: mob.selector.self
        sound: { name: 'minecraft:entity.drowned.ambient', source: HOSTILE, volume: 1.5, pitch: 0.5 }

  - type: mob.skill.timer
    interval: 120
    delegate:
      type: mob.skill.shoot_projectile
      selector:
        type: mob.selector.pathfinding_target
      hitValidator:
        type: mob.validator.and
        validators: [ /alivePlayers, /distanceCheck ]
      callback:
        type: mob.skill.spawn_mob.callback.none
      entity: sticky_bomb
      power: 1
      spread: 0
      gravity: false

goals:
  - type: mob.goal_applier.collection
    goalCreators:
      - type: zombies.mob.goal.break_window
        breakTicks: 20
        breakCount: 1
        breakRadius: 0.5

  - type: mob.goal_applier.collection
    goalCreators:
      - type: mob.goal.melee_attack
        cooldown: 20
        range: 0.25

      - type: mob.goal.follow_entity
        selector:
          type: mob.selector.entities_in_area
          originSelector:
            type: mob.selector.self
          validator: /alivePlayers
          target: PLAYERS
          limit: 1
        retargetInterval: 20
        followRange: 1024

alivePlayers:
  type: zombies.mob.validator.zombies_player
  states: [ zombies.player.state.alive ]
  blacklist: false

distanceCheck:
  type: mob.validator.distance
  distance: 8