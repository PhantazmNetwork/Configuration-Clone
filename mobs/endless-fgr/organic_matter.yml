key: organic_matter_fgre
type: minecraft:zombie
pathfinding:
  type: proxima.path_settings.ground
  jumpHeight: 2.5
  fallTolerance: 8
  stepHeight: 1.0
  targetDeviation: 8

meta:
  customName: <#251f1c>Mutated Organic Matter</#251f1c>
  isBaby: true

equipment:
  BOOTS: '{id:"golden_boots",Count:1,tag:{display:{color:9847076}}}'
  LEGGINGS: '{id:"golden_leggings",Count:1,tag:{display:{color:9847076}}}'
  CHESTPLATE: '{id:"leather_chestplate",Count:1,tag:{display:{color:9847076}}}'
  HELMET: '{id:"player_head",Count:1,tag:{display:{Name:"{\"text\":\"Fleshy\"}"},SkullOwner:{Id:[I;1092889773,1323059760,-1919812137,-28442049],Properties:{textures:[{Value:"eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvMjc1NjkyMmMyMWJjMTUxOGJmNjAzNTM1MDkzMGMzYjFmNGM5Yjc0YjEwYjBkNjIxYmFiYWE0ZTQxMTA5YzE3ZiJ9fX0="}]}}}}'

attributes:
  generic.max_health: 80
  generic.movement_speed: 0.24
  generic.attack_damage: 3
  generic.armor: 15
  generic.attack_knockback: 0.2

skills:
  - type: mob.skill.play_sound
    trigger: DAMAGED
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.slime.jump', source: HOSTILE, volume: 1.5, pitch: 0.5 }

  - type: mob.skill.play_sound
    trigger: DEATH
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.slime.hurt_small', source: HOSTILE, volume: 1.5, pitch: 0.5 }

  - type: mob.skill.random_timer
    minInterval: 100
    maxInterval: 160
    delegate:
      type: mob.skill.random
      chance: 0.5
      delegate:
        type: mob.skill.play_sound
        selector:
          type: mob.selector.self
        sound: { name: 'minecraft:entity.slime.squish', source: HOSTILE, volume: 1.5, pitch: 0.5 }

  - type: mob.skill.timer
    interval: 20
    delegate:
      type: mob.skill.shoot_projectile
      selector:
        type: mob.selector.pathfinding_target
      hitValidator:
        type: mob.validator.and
        validators: [ /alivePlayers, /distanceCheck ]
      callback:
        type: mob.skill.spawn_mob.callback.none
      entity: rotten_apple_rip
      power: 1.5
      spread: 0
      gravity: true

goals:
  - type: mob.goal_applier.collection
    goalCreators:
      - type: zombies.mob.goal.break_window
        breakTicks: 20
        breakCount: 1
        breakRadius: 0.5

  - type: mob.goal_applier.collection
    goalCreators:
      - type: mob.goal.melee_attack
        cooldown: 20
        range: 0.25

      - type: mob.goal.follow_entity
        selector:
          type: mob.selector.entities_in_area
          originSelector:
            type: mob.selector.self
          validator: /alivePlayers
          target: PLAYERS
          limit: 1
        retargetInterval: 20
        followRange: 1024

alivePlayers:
  type: zombies.mob.validator.zombies_player
  states: [ zombies.player.state.alive ]
  blacklist: false

distanceCheck:
  type: mob.validator.distance
  distance: 11