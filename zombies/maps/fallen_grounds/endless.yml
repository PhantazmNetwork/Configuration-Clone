type: zombies.endless.basic

# +5 HP every ~55 rounds
healthScaling:
  kind: LINEAR
  ceiling: 2147483647
  a: 0.09

# +2 dmg on ~56 rounds, +4 on ~186, etc
damageScaling:
  kind: LINEAR_SINUSOIDAL
  ceiling: 2048
  a: 135
  b: 4

# reaches max at endless round 250
speedScaling:
  kind: LINEAR
  ceiling: 0.15
  a: 0.0006

# reaches max at endless round ~475
spawnAmountScaling:
  kind: LINEAR_SINUSOIDAL
  ceiling: 150
  a: 25
  b: 8
spawnAmountBase: 50

# baseWaveDelays for each round reach minimum on endless r~?
waveDelayBase: 220

# all commented statistics are for mob count = 200
themes:
  # 1
  - type: zombies.endless.basic.theme
    # mobs/wave: 43, 68, 89
    waves:
      - type: zombies.endless.basic.weighted_wave
        # mobs/type: 10, 13, 20 (intr)
        wave:
          - key: phantazm:civilian
            spawnType: window
            weight: 10
          - key: phantazm:bloated
            spawnType: window
            weight: 13
        mobCountWeight: 43
        spawnActions:
          - type: zombies.map.wave.action.select_powerup
            powerups: [ "insta_kill" ]
      - type: zombies.endless.basic.weighted_wave
        # mobs/type: 27, 21 (intr), 20 (intr)
        wave:
          - key: phantazm:bloated
            spawnType: window
            weight: 27
        mobCountWeight: 68
        spawnActions: [ ]
      - type: zombies.endless.basic.weighted_wave
        # mobs/type: 25, 27, 25 (intr)
        wave:
          - key: phantazm:bloated
            spawnType: window
            weight: 50
          - key: phantazm:riot_police
            spawnType: window
            weight: 27
        mobCountWeight: 89
        spawnActions: [ ]
    baseWaveDelayTicks:
      kind: LINEAR_SINUSOIDAL
      ceiling: 0
      floor: -150
      a: 70
      b: -6.0
    offsetWaveDelayTicks:
      kind: LINEAR
      ceiling: 600
      floor: 20
      a: 400
    startActions:
      - type: zombies.map.round.action.announce
        format: <red>Round <round>
        destination: TITLE
        tickFormatter:
          type: core.tick_formatter.analog
          ceil: false

      - type: zombies.map.round.action.announce
        format: ""
        destination: SUBTITLE
        tickFormatter:
          type: core.tick_formatter.analog
          ceil: false

      - type: zombies.map.round.action.revive_players

      - type: zombies.map.round.action.play_sound
        sound: { name: 'minecraft:entity.wither.spawn', source: MASTER, volume: 24.0,
                 pitch: 0.5 }
    endActions: [ ]
