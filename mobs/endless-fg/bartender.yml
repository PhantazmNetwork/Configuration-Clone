  BOOTS: '{id:"netherite_boots",Count:1}'
  LEGGINGS: '{id:"iron_leggings",Count:1}'
  CHESTPLATE: '{id:"leather_chestplate",Count:1,tag:{display:{color:4076849}}}'
  HELMET: '{id:"player_head",Count:1,tag:{display:{Name:"{\"text\":\"Bartender\"}"},SkullOwner:{Id:[I;-1954937733,-1270527314,-1529407948,-1604253661],Properties:{textures:[{Value:"eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvZWMwNTU5OTZjZTI5MzFkZGJjNmE1ZTI1OTRkOTg1YWZkYTdjMjY0ZWFiODQ5MzBiMzk4ODdlOTJjZjNiNDg4ZSJ9fX0="}]}}}}'

attributes:
