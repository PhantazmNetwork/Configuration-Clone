key: firestarter_fge
type: minecraft:zombified_piglin
tags: [ endless, fire ]
pathfinding:
  type: proxima.path_settings.ground
  jumpHeight: 1.25
  fallTolerance: 5
  stepHeight: 0.5

meta:
  customName: <#ff8f53>Firestarter</#ff8f53>

equipment:
  MAIN_HAND: '{id:"blaze_rod",Count:1}'
  BOOTS: '{id:"netherite_boots",Count:1}'
  LEGGINGS: '{id:"leather_leggings",Count:1,tag:{display:{color:4273969}}}'

attributes:
  generic.max_health: 25
  generic.movement_speed: 0.21
  generic.attack_damage: 2
  generic.armor: 5
  generic.armor_toughness: 3
  generic.attack_knockback: 0.2

skills:
  - type: mob.skill.group
    trigger: ATTACK
    delegates:
      - type: mob.skill.damage_over_time
        trigger: ATTACK
        selector:
          type: mob.selector.last_hit
        validator: /alivePlayers
        damageAmount: 1.5
        bypassArmor: true
        damageInterval: 10
        damageTime: 80
        damageType: damage.fire
        exceedMobLifetime: true
        sound: { name: 'minecraft:entity.player.hurt_on_fire', source: PLAYER, volume: 1.0, pitch: 1.0 }

      - type: mob.skill.temporal
        trigger: ATTACK
        minDuration: 80
        maxDuration: 80
        delegate:
          type: mob.skill.apply_fire
          trigger: ATTACK
          selector:
            type: mob.selector.last_hit

  - type: mob.skill.play_sound
    trigger: DAMAGED
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.piglin.retreat', source: HOSTILE, volume: 1.5, pitch: 1.2 }

  - type: mob.skill.play_sound
    trigger: DEATH
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.piglin.death', source: HOSTILE, volume: 1.5, pitch: 1.3 }

  - type: mob.skill.random_timer
    minInterval: 100
    maxInterval: 160
    delegate:
      type: mob.skill.random
      chance: 0.5
      delegate:
        type: mob.skill.play_sound
        selector:
          type: mob.selector.self
        sound: { name: 'minecraft:entity.piglin.angry', source: HOSTILE, volume: 1.5, pitch: 1.3 }

  - type: mob.skill.random
    chance: 0.1
    delegate:
      type: mob.skill.random_timer
      minInterval: 210
      maxInterval: 270
      delegate:
        type: mob.skill.conditional
        condition:
          type: mob.skill.condition.boolean_tag
          selector:
            type: mob.selector.self
          tag: skill_cancel
          blacklist: true
        delegate:
          type: mob.skill.conditional
          condition:
            type: mob.skill.condition.distance
            originSelector:
              type: mob.selector.self
            targetSelector:
              type: mob.selector.entities_in_area
              originSelector:
                type: mob.selector.self
              range: 8
              target: PLAYERS
              validator: /alivePlayers
            distance: 8
          delegate:
            type: mob.skill.spawn_mob
            selector:
              type: mob.selector.self
            callback:
              type: zombies.mob.skill.spawn_mob.callback.add_to_round
            identifier: phantazm:firecracker_fge
            spawnAmount: 1
            maxSpawn: 5
            instanceCountKey: 'firecracker_fge_spawn'

goals:
  - type: mob.goal_applier.collection
    goalCreators:
      - type: zombies.mob.goal.break_window
        breakTicks: 20
        breakCount: 1
        breakRadius: 0.5

  - type: mob.goal_applier.collection
    goalCreators:
      - type: mob.goal.melee_attack
        cooldown: 12
        range: 0.25

      - type: mob.goal.follow_entity
        selector:
          type: mob.selector.entities_in_area
          originSelector:
            type: mob.selector.self
          validator:
            type: mob.validator.or
            validators: [ /alivePlayers, /targetableMobs ]
          target: LIVING_ENTITIES
          limit: 1
        retargetInterval: 20
        followRange: 1024

alivePlayers:
  type: zombies.mob.validator.zombies_player
  states: [ zombies.player.state.alive ]
  blacklist: false

targetableMobs:
  type: mob.validator.mob_type
  tags: [ ally_targetable ]
  blacklist: false

distanceCheck:
  type: mob.validator.distance
  distance: 12