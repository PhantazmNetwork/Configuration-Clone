key: powerhouse_fge
type: minecraft:piglin
tags: [ endless, tank, fire_res, ally, ally_targetable, debuff ]
pathfinding:
  type: proxima.path_settings.ground
  jumpHeight: 1.25
  fallTolerance: 5
  stepHeight: 0.5

showNameTag: true

meta:
  customName: <#3e2620>Powerhouse</#3e2620>
  customNameVisible: true

extra:
  forceDeselect: true
  resistInstakill: true
  resistFire: true
  partOfRound: false
  killAfterRound: false
  ticksUntilDeath: -1
  endlessHealthScaling:
    kind: LINEAR
    ceiling: 2147483647
    a: 5

equipment:
  MAIN_HAND: '{id:"golden_sword",Count:1}'
  BOOTS: '{id:"netherite_boots",Count:1}'
  LEGGINGS: '{id:"netherite_leggings",Count:1}'
  CHESTPLATE: '{id:"netherite_chestplate",Count:1}'
  HELMET: '{id:"turtle_helmet",Count:1}'

attributes:
  generic.max_health: 1200
  generic.movement_speed: 0.3
  generic.attack_damage: 2
  generic.armor: 20
  generic.attack_knockback: 0.2

skills:
  - type: mob.skill.attribute_modifying
    trigger: SPAWN
    selector:
      type: mob.selector.self
    attribute: damage.fire
    amount: -1.0
    attributeOperation: MULTIPLY_TOTAL

  - type: mob.skill.dialogue
    trigger: KILL
    selector:
      type: mob.selector.entities_in_area
      originSelector:
        type: mob.selector.self
      validator:
        type: mob.validator.always
      target: PLAYERS
    baseChance: 0.01
    uniqueMessages: 1
    dialogue:
      - message: <yellow><#3e2620>Powerhouse:</#3e2620> Come at me!</yellow>
        weight: 1
      - message: <yellow><#3e2620>Powerhouse:</#3e2620> Huh. I killed something.</yellow>
        weight: 1
      - message: <yellow><#3e2620>Powerhouse:</#3e2620> Why do I have to be the pack mule?</yellow>
        weight: 1

  - type: mob.skill.conditional
    trigger: DAMAGED
    condition:
      type: mob.skill.condition.flag
      selector:
        type: mob.selector.last_attacker
      flag: boss
      blacklist: true
    delegate:
      type: mob.skill.group
      delegates:
        - type: mob.skill.apply_boolean_tag
          selector:
            type: mob.selector.last_attacker
          tag: skill_cancel

        - type: mob.skill.attribute_modifying
          selector:
            type: mob.selector.last_attacker
          attribute: generic.attack_damage
          amount: -0.5
          attributeOperation: MULTIPLY_TOTAL

  - type: mob.skill.conditional
    trigger: DAMAGED
    condition:
      type: mob.skill.condition.flag
      selector:
        type: mob.selector.last_attacker
      flag: boss
      blacklist: false
    delegate:
      type: mob.skill.attribute_modifying
      selector:
        type: mob.selector.last_attacker
      attribute: generic.attack_damage
      amount: -0.25
      attributeOperation: MULTIPLY_TOTAL

  - type: mob.skill.dialogue
    trigger: DAMAGED
    selector:
      type: mob.selector.entities_in_area
      originSelector:
        type: mob.selector.self
      validator:
        type: mob.validator.always
      target: PLAYERS
    baseChance: 0.0001
    uniqueMessages: 1
    dialogue:
      - message: <yellow><#3e2620>Powerhouse:</#3e2620> Having a skill issue?</yellow>
        weight: 1
      - message: <yellow><#3e2620>Powerhouse:</#3e2620> Make it worth my time.</yellow>
        weight: 1
      - message: <yellow><#3e2620>Powerhouse:</#3e2620> My armor is untouchable!</yellow>
        weight: 1
      - message: <yellow><#3e2620>Powerhouse:</#3e2620> Didn't leave a scratch.</yellow>
        weight: 1


  - type: mob.skill.play_sound
    trigger: DAMAGED
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.piglin.retreat', source: HOSTILE, volume: 1.5, pitch: 0.8 }

  - type: mob.skill.play_sound
    trigger: DEATH
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.piglin.death', source: HOSTILE, volume: 1.5, pitch: 0.8 }

  - type: mob.skill.dialogue
    trigger: DEATH
    selector:
      type: mob.selector.entities_in_area
      originSelector:
        type: mob.selector.self
      validator:
        type: mob.validator.always
      target: PLAYERS
    baseChance: 1.0
    uniqueMessages: 1
    dialogue:
      - message: <#ff806d><#3e2620>Powerhouse:</#3e2620> Ngh- does this mean that I can finally get out of this suit?</#ff806d>
        weight: 1
      - message: <#ff806d><#3e2620>Powerhouse:</#3e2620> Pig down... ugh...</#ff806d>
        weight: 1
      - message: <#ff806d><#3e2620>Powerhouse:</#3e2620> I regret everything...</#ff806d>
        weight: 1
      - message: <#ff806d><#3e2620>Powerhouse:</#3e2620> I feel like a can of freakin' sardines right now.</#ff806d>
        weight: 1

  - type: mob.skill.show_healthbar
    bar: '<#6b6f80>[<healthbar:bar_component:I:color_start:#00a8b7:color_end:#a900b7:missing_color:gray>]</#6b6f80>'
    barWidth: 10

  - type: mob.skill.random_timer
    minInterval: 100
    maxInterval: 160
    delegate:
      type: mob.skill.random
      chance: 0.5
      delegate:
        type: mob.skill.play_sound
        selector:
          type: mob.selector.self
        sound: { name: 'minecraft:entity.piglin.angry', source: HOSTILE, volume: 1.5, pitch: 0.75 }

goals:
  - type: mob.goal_applier.collection
    goalCreators:
      - type: zombies.mob.goal.break_window
        breakTicks: 20
        breakCount: 1
        breakRadius: 0.5

  - type: mob.goal_applier.collection
    goalCreators:
      - type: mob.goal.melee_attack
        cooldown: 20
        range: 0.25

      - type: mob.goal.follow_entity
        selector:
          type: mob.selector.entities_in_area
          originSelector:
            type: mob.selector.self
          validator: /allyExcludedMobs
          target: LIVING_ENTITIES
          limit: 1
        retargetInterval: 20
        followRange: 1024

alivePlayers:
  type: zombies.mob.validator.zombies_player
  states: [ zombies.player.state.alive ]
  blacklist: false

combinedValidator:
  type: mob.validator.and
  validators:
    - type: mob.validator.mob

    - type: mob.validator.not
      validators: [ /targetableMobs ]

allyExcludedMobs:
  type: mob.validator.mob_type
  tags: [ ally_targetable, trap_invincible ]
  blacklist: true

targetableMobs:
  type: mob.validator.mob_type
  tags: [ ally_targetable ]
  blacklist: false

distanceCheck:
  type: mob.validator.distance
  distance: 12