# FG: 12, 15
# FG Endless: 1, 7, 11, 17, 21, 27, 31, 37
# GAU: 2, 6, 13, 17, 28
id: insta_kill
visuals:
  - type: zombies.powerup.visual.hologram
    lines: [ "<#e61927><b>Insta Kill</b></#e61927>" ]
    timeUntilBlink: 1000
    blinkFrames:
      - components: [ "<white><b>Insta Kill</b></white>" ]
        delay: 20
      - components: [ "<#e61927><b>Insta Kill</b></#e61927>" ]
        delay: 20
    heightOffset: 1.25

  - type: zombies.powerup.visual.item
    stack: '{id:"player_head",Count:1,tag:{display:{Name:"{\"text\":\"Skull\"}"},SkullOwner:{Id:[I;-967193132,-466204297,-1498950319,-1900097605],Properties:{textures:[{Value:"eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvMWFlMzg1NWY5NTJjZDRhMDNjMTQ4YTk0NmUzZjgxMmE1OTU1YWQzNWNiY2I1MjYyN2VhNGFjZDQ3ZDMwODEifX19"}]}}}}'
    interval: 1
    period: 40
    periodOffset: 0
    amplitude: 0.1
    heightOffset: 1

actions:
  - type: zombies.powerup.action.map_flagging
    flag: phantazm:zombies.map.flag.insta_kill
    deactivationPredicate:
      type: zombies.powerup.deactivation_predicate.timed
      time: 200
  - type: zombies.powerup.action.send_message
    format: <player> <yellow>activated <#e61927><b>Insta Kill</b></#e61927> for <red><b>10s</b></red>!</yellow>
    broadcast: true

  - type: zombies.powerup.action.play_sound
    sound: { name: 'minecraft:ambient.basalt_deltas.mood', source: PLAYER, volume: 4.0, pitch: 0.8 }

  - type: zombies.powerup.action.play_sound
    sound: { name: 'minecraft:ambient.basalt_deltas.mood', source: PLAYER, volume: 4.0, pitch: 0.8 }

  - type: zombies.powerup.action.play_sound
    sound: { name: 'minecraft:ambient.basalt_deltas.mood', source: PLAYER, volume: 4.0, pitch: 0.8 }

  - type: zombies.powerup.action.play_sound
    sound: { name: 'minecraft:ambient.basalt_deltas.mood', source: PLAYER, volume: 4.0, pitch: 0.8 }

  - type: zombies.powerup.action.play_sound
    sound: { name: 'minecraft:ambient.basalt_deltas.mood', source: PLAYER, volume: 4.0, pitch: 0.8 }

  - type: zombies.powerup.action.play_sound
    sound: { name: 'minecraft:ambient.basalt_deltas.mood', source: PLAYER, volume: 4.0, pitch: 0.8 }

  - type: zombies.powerup.action.boss_bar_timer
    duration: 200
    format: <#e61927><b>Insta Kill</b></#e61927> <#b8bfde>-</#b8bfde> <red><b><time>s</b></red>
    color: RED
    overlay: PROGRESS
    tickFormatter:
      type: core.tick_formatter.precision_second
      decimalPlaces: 1

  - type: zombies.powerup.action.send_title
    message: ""
    titlePart: TITLE
    broadcast: true

  - type: zombies.powerup.action.send_title
    message: <#e61927><b>Insta Kill
    titlePart: SUBTITLE
    broadcast: true

deactivationPredicate:
  type: zombies.powerup.deactivation_predicate.timed
  time: 1200
powerupEffect:
  type: zombies.powerup.entity_effect.glow
  glowColor: DARK_RED
