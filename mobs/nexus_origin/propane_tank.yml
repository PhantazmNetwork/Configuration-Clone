key: propane_tank
type: minecraft:zombie
pathfinding:
  type: proxima.path_settings.ground
  jumpHeight: 1.25
  fallTolerance: 4
  stepHeight: 2.0

meta:
  isInvisible: true
  customName: <#dc7f54>Punctured Propane Tank</#dc7f54>

equipment:
  HELMET: '{id:"polished_granite",Count:1}'

attributes:
  generic.max_health: 20
  generic.movement_speed: 0.5
  generic.attack_damage: 2
  generic.armor: 69420
  generic.attack_knockback: 0.2
  generic.knockback_resistance: 1.0

skills:
  - type: mob.skill.play_sound
    trigger: DAMAGED
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:block.chain.break', source: HOSTILE, volume: 1.5, pitch: 0.5 }

  - type: mob.skill.play_sound
    trigger: DEATH
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:block.anvil.place', source: HOSTILE, volume: 1.5, pitch: 1.4 }

  - type: mob.skill.play_sound
    trigger: DEATH
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.generic.explode', source: HOSTILE, volume: 2.0, pitch: 1.0 }

  - type: mob.skill.radial_damage
    trigger: DEATH
    selector:
      type: mob.selector.entities_in_area
      originSelector:
        type: mob.selector.self
      range: 4.5
      target: PLAYERS
      validator: /alivePlayers
    damage: 5
    range: 4.5

  - type: mob.skill.spawn_particle
    trigger: DEATH
    selector:
      type: mob.selector.self
    particle:
      type: particle.wrapper
      particle: explosion
      variantData:
        type: particle.variant_data.none
      distance: false
      offsetX: 0
      offsetY: 0
      offsetZ: 0
      data: 0.0
      particleCount: 1
    bounds:
      origin:
        x: 0.0
        y: 1.0
        z: 0.0
      lengths:
        x: 0.0
        y: 0.0
        z: 0.0

  - type: mob.skill.random_timer
    minInterval: 50
    maxInterval: 80
    delegate:
      type: mob.skill.play_sound
      selector:
        type: mob.selector.self
      sound: { name: 'minecraft:block.fire.extinguish', source: HOSTILE, volume: 1.5, pitch: 2.0 }

  - type: mob.skill.random_timer
    minInterval: 100
    maxInterval: 160
    delegate:
      type: mob.skill.random
      chance: 0.5
      delegate:
        type: mob.skill.spawn_particle
        selector:
          type: mob.selector.self
        particle:
          type: particle.wrapper
          particle: snowflake
          variantData:
            type: particle.variant_data.none
          distance: false
          offsetX: 0.1
          offsetY: 0
          offsetZ: 0.1
          data: 0.0
          particleCount: 10
        bounds:
          origin:
            x: 0.0
            y: 1.5
            z: 0.0
          lengths:
            x: 0.0
            y: 0.0
            z: 0.0

goals:
  - type: mob.goal_applier.collection
    goalCreators:
      - type: zombies.mob.goal.break_window
        breakTicks: 20
        breakCount: 1
        breakRadius: 0.5

  - type: mob.goal_applier.collection
    goalCreators:
      - type: mob.goal.melee_attack
        cooldown: 20
        range: 0.25

      - type: mob.goal.follow_entity
        selector:
          type: mob.selector.entities_in_area
          originSelector:
            type: mob.selector.self
          validator: /alivePlayers
          target: PLAYERS
          limit: 1
        retargetInterval: 20
        followRange: 1024

alivePlayers:
  type: zombies.mob.validator.zombies_player
  states: [ zombies.player.state.alive ]
  blacklist: false