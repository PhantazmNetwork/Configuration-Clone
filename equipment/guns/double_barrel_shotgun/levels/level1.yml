type: zombies.gun.level
key: level1
stats:
  type: zombies.gun.stats
  shootSpeed: 15
  reloadSpeed: 40
  maxAmmo: 60
  maxClip: 4
  shots: 2
  shotInterval: 8
shootTester:
  type: zombies.gun.shoot_tester.state
  stats: /stats
  reloadTester: /reloadTester
reloadTester:
  type: zombies.gun.reload_tester.state
  stats: /stats
firer:
  type: zombies.gun.firer.spread
  amount: 7
  angleVariance: 15
  subFirers:
    - type: zombies.gun.firer.hit_scan
      endSelector:
        type: zombies.gun.end_selector.basic
        blockIterations:
          - type: zombies.gun.block_iteration.window
          - type: zombies.gun.block_iteration.block
            passableBlocks: [ 'minecraft:barrier' ]
          - type: zombies.gun.block_iteration.wallshot
            wallshootingChecker: /wallshootingChecker
            passableBlocks: [ 'minecraft:barrier' ]
        maxDistance: 10
      targetFinder:
        type: zombies.gun.target_finder.basic
        entityFinder:
          type: zombies.gun.entity_finder.directional.between_points
        targetTester:
          type: zombies.gun.target_tester.phantazm_mob
        intersectionFinder:
          type: zombies.gun.intersection_finder.ray_trace
        headshotTester:
          type: zombies.gun.headshot_tester.eye_height
        targetLimiter:
          type: zombies.gun.target_limiter.distance
          targetLimit: 1
          prioritizeClosest: true
      shotHandlers:
        - type: zombies.gun.shot_handler.damage
          damage: 5
          headshotDamage: 5
          armorBehavior: BYPASS_ON_HEADSHOT

        - type: zombies.gun.shot_handler.knockback
          knockback: 0.5
          headshotKnockback: 0.6

        - type: zombies.gun.shot_handler.give_coins
          normalCoins: 12
          headshotCoins: 14
          instaKillCoins: 50

        - type: zombies.gun.shot_handler.sound
          audienceProvider: /audienceProvider
          sound:
            name: 'minecraft:entity.arrow.hit_player'
            source: PLAYER
            volume: 10
            pitch: 2
          headshotSound:
            name: 'minecraft:entity.arrow.hit_player'
            source: PLAYER
            volume: 10
            pitch: 1.5
          atShooter: true

        - type: zombies.gun.shot_handler.particle_trail
          particle:
            type: particle.wrapper
            particle: smoke
            variantData:
              type: particle.variant_data.none
            distance: false
            offsetX: 0
            offsetY: 0
            offsetZ: 0
            data: 0
            particleCount: 1
          trailCount: 3

activateEffects: [ ]
shootEffects:
  - type: zombies.gun.effect.play_sound
    audienceProvider: /audienceProvider
    sound:
      name: 'minecraft:entity.generic.explode'
      source: PLAYER
      volume: 10.0
      pitch: 2.0
reloadEffects:
  - type: zombies.gun.effect.reload.action_bar
    stats: /stats
    actionBarSender: /actionBarSender
    reloadTester: /reloadTester
    reloadActionBarChooser:
      type: zombies.gun.action_bar_chooser.static
      message: <red><b>RELOADING...

  - type: zombies.gun.effect.play_sound
    audienceProvider: /audienceProvider
    sound:
      name: 'minecraft:entity.horse.gallop'
      source: PLAYER
      volume: 10.0
      pitch: 0.5
tickEffects:
  - type: zombies.gun.effect.ammo_level

  - type: zombies.gun.effect.exp.shoot
    stats: /stats

  - type: zombies.gun.effect.alert_no_ammo
    audienceProvider: /audienceProvider
    message:
      component: <b><red>OUT OF AMMO</red></b>
      destination: ACTION_BAR
noAmmoEffects:
  - type: zombies.gun.effect.send_message
    audienceProvider: /audienceProvider
    message:
      component: <#ff2655>[⚠] <b><#ff2655>This weapon is out of ammo!</#ff2655> <red>You can refill ammo at the place that you purchased the weapon or through the <blue>Refill Ammo Machine</blue>.</red></b>
      destination: CHAT
gunStackMappers:
  - type: zombies.gun.stack_mapper.clip.stack_count
    reloadTester: /reloadTester

  - type: zombies.gun.stack_mapper.reload.durability
    stats: /stats
    reloadTester: /reloadTester

stack:
  material: 'minecraft:flint_and_steel'
  displayName: '<!i><gold><b>Double Barrel Shotgun Ultimate</b></gold></!i>'
  lore:
    - '<!i><#9096ad>By adding precise amounts of</#9096ad></!i>'
    - '<!i><#9096ad>additional duct tape, you have</#9096ad></!i>'
    - '<!i><#9096ad>perfected the feel and balance of</#9096ad></!i>'
    - '<!i><#9096ad>this weapon in your hands.</#9096ad></!i>'
    - ''
    - '<!i><#616575>»</#616575> <#9096ad>Damage</#9096ad><#b8bfde>:</#b8bfde> <#6b6f80>4.0 HP ➠<#6b6f80> <green>5.0 HP</green></!i>'
    - '<!i><#616575>»</#616575> <#9096ad>Headshot</#9096ad><#b8bfde>:</#b8bfde> <green>5.0 HP</green></!i>'
    - '<!i><#616575>»</#616575> <#9096ad>Max Ammo</#9096ad><#b8bfde>:</#b8bfde> <#6b6f80>50 ➠<#6b6f80> <green>60</green></!i>'
    - '<!i><#616575>»</#616575> <#9096ad>Clip Size</#9096ad><#b8bfde>:</#b8bfde> <#6b6f80>2 ➠<#6b6f80> <green>4</green></!i>'
    - '<!i><#616575>»</#616575> <#9096ad>Fire Rate</#9096ad><#b8bfde>:</#b8bfde> <#6b6f80>0.5s (2/s) ➠<#6b6f80> <red>0.75s (1.3/s)</red></!i>'
    - '<!i><#616575>»</#616575> <#9096ad>Reload Speed</#9096ad><#b8bfde>:</#b8bfde> <#6b6f80>2s ➠<#6b6f80> <green>1.5s</green></!i>'
    - '<!i><#616575>»</#616575> <#9096ad>Pellets</#9096ad><#b8bfde>:</#b8bfde> <#6b6f80>8 ➠<#6b6f80> <red>7</red></!i>'
    - ''
    - '<!i><yellow><b><key:key.attack><b></yellow> <#9096ad>to reload.</#9096ad></!i>'
    - '<!i><yellow><b><key:key.use><b></yellow> <#9096ad>to shoot.</#9096ad></!i>'
  tag: '{HideFlags:2,"Enchantments":[{id:"minecraft:unbreaking",lvl:1s}]}'
upgrades: [ ]

audienceProvider:
  type: zombies.gun.audience_provider.player

actionBarSender:
  type: zombies.gun.action_bar.zombies_player_sender
  priority: 1

wallshootingChecker:
  type: zombies.gun.wallshooting.wallshooting_checker.map_objects
