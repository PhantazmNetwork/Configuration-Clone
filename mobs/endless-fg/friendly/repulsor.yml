key: repulsor_fge
type: minecraft:piglin
tags: [ endless, tank, fire_res, ally, ally_targetable ]
pathfinding:
  type: proxima.path_settings.ground
  jumpHeight: 1.25
  fallTolerance: 5
  stepHeight: 0.5

showNameTag: true

meta:
  customName: <#a3f1ff>Repulsor</#a3f1ff>
  customNameVisible: true

extra:
  forceDeselect: true
  resistInstakill: true
  resistFire: true
  partOfRound: false
  killAfterRound: false
  ticksUntilDeath: -1
  endlessHealthScaling:
    kind: LINEAR
    ceiling: 2147483647
    a: 5

equipment:
  # TODO: add mace after we update
  MAIN_HAND: '{id:"goat_horn",Count:1}'
  BOOTS: '{id:"diamond_boots",Count:1}'
  LEGGINGS: '{id:"diamond_leggings",Count:1}'
  CHESTPLATE: '{id:"iron_chestplate",Count:1}'
  HELMET: '{id:"turtle_helmet",Count:1}'

attributes:
  generic.max_health: 600
  generic.movement_speed: 0.24
  generic.attack_damage: 11
  generic.armor: 17
  generic.attack_knockback: 0.8

skills:
  - type: mob.skill.attribute_modifying
    trigger: SPAWN
    selector:
      type: mob.selector.self
    attribute: damage.fire
    amount: -1.0
    attributeOperation: MULTIPLY_TOTAL

  - type: mob.skill.dialogue
    trigger: KILL
    selector:
      type: mob.selector.entities_in_area
      originSelector:
        type: mob.selector.self
      validator:
        type: mob.validator.always
      target: PLAYERS
    baseChance: 0.01
    uniqueMessages: 1
    dialogue:
      - message: <yellow><#a3f1ff>Repulsor:</#a3f1ff> HEHEHE- AHAHAHA! HAHA!</yellow>
        weight: 1
      - message: <yellow><#a3f1ff>Repulsor:</#a3f1ff> ALL YOUR BASE ARE BELONG TO ME!</yellow>
        weight: 1
      - message: <yellow><#a3f1ff>Repulsor:</#a3f1ff> HAHAHAHA! I AM BECOME DEATH, DESTROYER OF ZOMBIES!</yellow>
        weight: 1
      - message: <yellow><#a3f1ff>Repulsor:</#a3f1ff> I... FEEL... SO ALIVE!</yellow>
        weight: 1
      - message: <yellow><#a3f1ff>Repulsor:</#a3f1ff> GIT GUD, SCRUB!</yellow>
        weight: 1

  - type: mob.skill.play_sound
    trigger: DAMAGED
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.piglin.retreat', source: HOSTILE, volume: 1.5, pitch: 1.2 }

  - type: mob.skill.play_sound
    trigger: DEATH
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.piglin.death', source: HOSTILE, volume: 1.5, pitch: 1.3 }

  - type: mob.skill.dialogue
    trigger: DEATH
    selector:
      type: mob.selector.entities_in_area
      originSelector:
        type: mob.selector.self
      validator:
        type: mob.validator.always
      target: PLAYERS
    baseChance: 1.0
    uniqueMessages: 1
    dialogue:
      - message: <#ff806d><#a3f1ff>Repulsor:</#a3f1ff> MY KILLSTREAK IS STILL HIGHER THAN YOURS!</#ff806d>
        weight: 1
      - message: <#ff806d><#a3f1ff>Repulsor:</#a3f1ff> Agh! Took you long enough, noob!</#ff806d>
        weight: 1
      - message: <#ff806d><#a3f1ff>Repulsor:</#a3f1ff> NOOOO! My kill/death ratio!</#ff806d>
        weight: 1

  - type: mob.skill.show_healthbar
    bar: '<#6b6f80>[<healthbar:bar_component:I:color_start:#00a8b7:color_end:#a900b7:missing_color:gray>]</#6b6f80>'
    barWidth: 10

  - type: mob.skill.random_timer
    minInterval: 100
    maxInterval: 160
    delegate:
      type: mob.skill.random
      chance: 0.5
      delegate:
        type: mob.skill.play_sound
        selector:
          type: mob.selector.self
        sound: { name: 'minecraft:entity.piglin.angry', source: HOSTILE, volume: 1.5, pitch: 1.3 }

  - type: mob.skill.random_timer
    minInterval: 120
    maxInterval: 190
    delegate:
      type: mob.skill.group
      delegates:
        - type: mob.skill.play_sound
          selector:
            type: mob.selector.self
          sound: { name: 'minecraft:entity.warden.sonic_charge', source: HOSTILE, volume: 2.0, pitch: 2.0 }

        - type: mob.skill.timer
          repeat: 1
          interval: 10
          requiresActivation: true
          delegate:
            type: mob.skill.group
            delegates:
              - type: mob.skill.push
                power: 30
                vertical: 9
                selector:
                  type: mob.selector.entities_in_area
                  originSelector:
                    type: mob.selector.self
                  range: 6
                  target: LIVING_ENTITIES
                  validator: /allyExcludedMobs

              - type: mob.skill.spawn_particle
                selector:
                  type: mob.selector.self
                particle:
                  type: particle.wrapper
                  particle: sonic_boom
                  variantData:
                    type: particle.variant_data.none
                  distance: true
                  offsetX: 0.5
                  offsetY: 0.5
                  offsetZ: 0.5
                  data: 0.0
                  particleCount: 10
                bounds:
                  origin:
                    x: 0.0
                    y: 0.5
                    z: 0.0
                  lengths:
                    x: 0.0
                    y: 0.0
                    z: 0.0

goals:
  - type: mob.goal_applier.collection
    goalCreators:
      - type: zombies.mob.goal.break_window
        breakTicks: 20
        breakCount: 1
        breakRadius: 0.5

  - type: mob.goal_applier.collection
    goalCreators:
      - type: mob.goal.melee_attack
        cooldown: 20
        range: 1.0

      - type: mob.goal.follow_entity
        selector:
          type: mob.selector.entities_in_area
          originSelector:
            type: mob.selector.self
          validator: /allyExcludedMobs
          target: LIVING_ENTITIES
          limit: 1
        retargetInterval: 20
        followRange: 1024

alivePlayers:
  type: zombies.mob.validator.zombies_player
  states: [ zombies.player.state.alive ]
  blacklist: false

targetableMobs:
  type: mob.validator.mob_type
  tags: [ ally_targetable ]
  blacklist: false

allyExcludedMobs:
  type: mob.validator.mob_type
  tags: [ ally_targetable, trap_invincible ]
  blacklist: true

combinedValidator:
  type: mob.validator.and
  validators:
    - type: mob.validator.mob

    - type: mob.validator.not
      validators: [ /targetableMobs ]

distanceCheck:
  type: mob.validator.distance
  distance: 12