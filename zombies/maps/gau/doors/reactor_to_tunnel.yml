id: reactor_to_tunnel
opensTo: [ reactor, tunnel ]
costs: [ 600, 800 ]
holograms:
  - text: [ "<green>Tunnel", "<gold>800 Coins" ]
    position:
      x: 0
      y: -1
      z: -0.7
  - text: [ "<green>Reactor", "<gold>600 Coins" ]
    position:
      x: 0
      y: -1
      z: 0.7
regions:
  - origin: { x: 45, y: 0, z: 24 }
    lengths: { x: 3, y: 4, z: 1 }
openSound: { name: 'minecraft:block.wooden_door.open', source: BLOCK, volume: 10.0,
             pitch: 0.0 }
openActions:
  - type: zombies.map.door.action.send_opened_rooms
    nameFormat: "<opener>"
    openedRoomsFormat: "<#9096ad>opened</#9096ad> <green><b><rooms:, ></b></green>"
    nameTitlePart: TITLE
    openedRoomsTitlePart: SUBTITLE
closeActions: [ ]
failOpenActions:
  - type: zombies.map.door.action.play_sound
    atInteractor: true
    sound: { name: 'minecraft:entity.enderman.teleport', source: BLOCK, volume: 10.0,
             pitch: 0.0 }
  - type: zombies.map.door.action.send_message
    messages: [ "<red>You don't have enough coins to open that door!" ]
    broadcast: false
