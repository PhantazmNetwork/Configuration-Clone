        selector:
          type: mob.selector.self
        sound: { name: 'minecraft:block.glass.break', source: HOSTILE, volume: 1.5, pitch: 1.0 }

  - type: mob.skill.conditional
    trigger: DEATH
    condition:
      type: mob.skill.condition.boolean_tag
      selector:
        type: mob.selector.self
      tag: skill_cancel
      blacklist: true
    delegate:
      type: mob.skill.weighted_random
      delegates:
        - type: mob.skill.lingering
          selector:
            type: mob.selector.self
          targetSkills:
            - type: mob.skill.timer
              interval: 10
              delegate:
                type: mob.skill.group
                delegates:
                  - type: mob.skill.potion
                    selector:
                      type: mob.selector.entities_in_area
                      originSelector:
                        type: mob.selector.self
                      range: 4.0
                      target: PLAYERS
                      validator: /alivePlayers
                    potion:
                      effect: minecraft:poison
                      amplifier: 1
                      duration: 50
                      flags: 6

                  - type: mob.skill.damage_over_time
                    selector:
                      type: mob.selector.entities_in_area
                      originSelector:
                        type: mob.selector.self
                      range: 4.0
                      target: PLAYERS
                      validator: /alivePlayers
                    validator: /alivePlayers
                    damageAmount: 1.0
                    bypassArmor: true
                    damageInterval: 12
                    damageTime: 50
                    damageType: damage.poison
                    minHealth: 1

                  - type: mob.skill.spawn_particle_circle
                    selector:
                      type: mob.selector.self
                    particle:
                      type: particle.wrapper
                      particle: dust
                      variantData:
                        type: particle.variant_data.dust
                        color:
                          r: 50
                          g: 102
                          b: 36
                        size: 2
                      distance: true
                      offsetX: 0.0
                      offsetY: 0.0
                      offsetZ: 0.0
                      data: 0.0
                      particleCount: 1
                    heightOffset: 0.2
                    radius: 4.0
                    density: 2.0
          lifetime: 140

        - type: mob.skill.lingering
