id: qf_eh_synergy
data:
  type: zombies.upgrade.standard
  triggers:
    - type: zombies.upgrade.trigger.event
      event: ZOMBIES_PLAYER_KILL_MOB
      eventFilter:
        type: zombies.upgrade.filter.type
        conditions:
          - type: zombies.upgrade.filter.condition.zombies_player
  effect:
    type: zombies.upgrade.effect.conditional
    pass:
      type: zombies.upgrade.effect.composite
      delegates:
        - type: zombies.upgrade.effect.heal
          selector:
            type: zombies.upgrade.selector.self
          healAmount: 5.0

        - type: zombies.upgrade.effect.temporal
          timer:
            type: zombies.upgrade.timer.constant
            duration: 300
          delegate:
            type: zombies.upgrade.effect.apply_attribute
            selector:
              type: zombies.upgrade.selector.self
            attribute: phantazm.heal_rate
            amount: -0.5
            operation: MULTIPLY_BASE
    fail:
      type: zombies.upgrade.effect.conditional
      pass:
        type: zombies.upgrade.effect.heal
        selector:
          type: zombies.upgrade.selector.self
        healAmount: 2.0
      filter:
        type: zombies.upgrade.filter.type
        conditions:
          - type: zombies.upgrade.filter.condition.damage_tag
            tag: 'phantazm.zombies.is_headshot'
    filter:
      type: zombies.upgrade.filter.type
      conditions:
        - type: zombies.upgrade.filter.condition.mob_flag
          flag: 'boss'
          useTarget: true