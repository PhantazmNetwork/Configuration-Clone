id: phantazm:storeroom_to_terrace
opensTo: ['phantazm:storeroom', 'phantazm:terrace']
costs: [0, 30000]
holograms:
- text: [<green>Terrace, <gold>30000 Coins]
  position: {x: 0.0, y: 0.0, z: 0.7}
regions:
- origin: {x: 46, y: 23, z: -3}
  lengths: {x: 3, y: 4, z: 1}
openSound: {name: 'minecraft:block.wooden_door.open', source: BLOCK, volume: 10.0,
  pitch: 0.0}
openActions:
- {type: zombies.map.door.action.send_opened_rooms, nameFormat: <opener>, openedRoomsFormat: '<#9096ad>opened</#9096ad>
    <green><b><rooms:, ></b></green>', nameTitlePart: TITLE, openedRoomsTitlePart: SUBTITLE}
closeActions: []
failOpenActions:
- type: zombies.map.door.action.play_sound
  atInteractor: true
  sound: {name: 'minecraft:entity.enderman.teleport', source: BLOCK, volume: 10.0,
    pitch: 0.0}
- type: zombies.map.door.action.send_message
  messages: [<red>You don't have enough coins to open that door!]
  broadcast: false
