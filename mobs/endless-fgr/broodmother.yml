key: broodmother_fgre
type: minecraft:zombified_piglin
pathfinding:
  type: proxima.path_settings.ground
  jumpHeight: 1.5
  fallTolerance: 8
  stepHeight: 0.5

showNameTag: true

meta:
  customName: <b><#b90f0f>RIP</#b90f0f> <#ee8989>Broodmother</#ee8989></b>
  customNameVisible: true

extra:
  resistInstakill: true
  announceKill: true
  resistSlowDown: true

equipment:
  MAIN_HAND: '{id:"nether_wart",Count:1}'
  OFF_HAND: '{id:"nether_wart",Count:1}'
  BOOTS: '{id:"diamond_boots",Count:1}'
  LEGGINGS: '{id:"diamond_leggings",Count:1}'
  CHESTPLATE: '{id:"leather_chestplate",Count:1,tag:{display:{color:15632777}}}'
  HELMET: '{id:"diamond_helmet",Count:1}'

attributes:
  generic.max_health: 1500
  generic.movement_speed: 0.2
  generic.attack_damage: 4
  generic.armor: 15
  generic.attack_knockback: 0.8
  generic.knockback_resistance: 1.0

skills:
  - type: mob.skill.send_message
    trigger: SPAWN
    message: <b><#b90f0f>RIP</#b90f0f></b> <yellow><#ee8989><b>Broodmother</b></#ee8989> has spawned!</yellow>
    selector:
      type: mob.selector.entities_in_area
      originSelector:
        type: mob.selector.self
      validator:
        type: mob.validator.always
      target: PLAYERS

  - type: mob.skill.play_sound
    trigger: SPAWN
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.lightning_bolt.thunder', source: PLAYER, volume: 100.0, pitch: 1.0 }

  - type: mob.skill.play_sound
    trigger: DAMAGED
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.zombified_piglin.hurt', source: HOSTILE, volume: 1.5, pitch: 0.5 }

  - type: mob.skill.radial_damage
    trigger: DEATH
    selector:
      type: mob.selector.entities_in_area
      originSelector:
        type: mob.selector.self
      range: 6
      target: PLAYERS
      validator: /alivePlayers
    damage: 15
    bypassArmor: true
    range: 6

  - type: mob.skill.play_sound
    trigger: DEATH
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.generic.explode', source: HOSTILE, volume: 2.0, pitch: 1.0 }

  - type: mob.skill.play_sound
    trigger: DEATH
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.generic.explode', source: HOSTILE, volume: 2.0, pitch: 1.0 }

  - type: mob.skill.spawn_particle
    trigger: DEATH
    selector:
      type: mob.selector.self
    particle:
      type: particle.wrapper
      particle: block
      variantData:
        type: particle.variant_data.block
        block: minecraft:redstone_block
      distance: true
      offsetX: 0.5
      offsetY: 0.5
      offsetZ: 0.5
      data: 0.0
      particleCount: 60
    bounds:
      origin:
        x: 0.0
        y: 1.0
        z: 0.0
      lengths:
        x: 0.0
        y: 0.0
        z: 0.0

  - type: mob.skill.spawn_particle
    trigger: DEATH
    selector:
      type: mob.selector.self
    particle:
      type: particle.wrapper
      particle: explosion
      variantData:
        type: particle.variant_data.none
      distance: true
      offsetX: 0
      offsetY: 0
      offsetZ: 0
      data: 0.0
      particleCount: 1
    bounds:
      origin:
        x: 0.0
        y: 1.0
        z: 0.0
      lengths:
        x: 0.0
        y: 0.0
        z: 0.0

  - type: mob.skill.spawn_mob
    trigger: DEATH
    selector:
      type: mob.selector.self
    callback:
      type: zombies.mob.skill.spawn_mob.callback.add_to_round
    identifier: phantazm:bloated_piglet_endless-fg
    spawnAmount: 14
    maxSpawn: 14

  - type: mob.skill.show_healthbar
    bar: '<#6b6f80>[<healthbar:bar_component:|:color_start:#dd3e28:color_end:#34bf25:missing_color:gray>]</#6b6f80>'
    barWidth: 20

  - type: mob.skill.random_timer
    minInterval: 100
    maxInterval: 160
    delegate:
      type: mob.skill.random
      chance: 0.5
      delegate:
        type: mob.skill.group
        delegates:
          - type: mob.skill.play_sound
            selector:
              type: mob.selector.self
            sound: { name: 'minecraft:entity.zombified_piglin.angry', source: HOSTILE, volume: 1.5, pitch: 0.5 }

          - type: mob.skill.play_sound
            selector:
              type: mob.selector.self
            sound: { name: 'minecraft:entity.zombified_piglin.angry', source: HOSTILE, volume: 1.5, pitch: 0.7 }

  - type: mob.skill.timer
    interval: 50
    delegate:
      type: mob.skill.group
      delegates:
        - type: mob.skill.radial_damage
          selector:
            type: mob.selector.entities_in_area
            originSelector:
              type: mob.selector.self
            range: 5.5
            target: PLAYERS
            validator: /alivePlayers
          damage: 7
          bypassArmor: true
          range: 5.5

        - type: mob.skill.play_sound
          selector:
            type: mob.selector.self
          sound: { name: 'minecraft:entity.generic.explode', source: HOSTILE, volume: 2.0, pitch: 1.0 }

        - type: mob.skill.spawn_particle
          selector:
            type: mob.selector.self
          particle:
            type: particle.wrapper
            particle: explosion
            variantData:
              type: particle.variant_data.none
            distance: true
            offsetX: 0
            offsetY: 0
            offsetZ: 0
            data: 0.0
            particleCount: 1
          bounds:
            origin:
              x: 0.0
              y: 1.0
              z: 0.0
            lengths:
              x: 0.0
              y: 0.0
              z: 0.0

goals:
  - type: mob.goal_applier.collection
    goalCreators:
      - type: zombies.mob.goal.break_window
        breakTicks: 20
        breakCount: 1
        breakRadius: 0.5

  - type: mob.goal_applier.collection
    goalCreators:
      - type: mob.goal.melee_attack
        cooldown: 20
        range: 0.25

      - type: mob.goal.follow_entity
        selector:
          type: mob.selector.entities_in_area
          originSelector:
            type: mob.selector.self
          validator: /alivePlayers
          target: PLAYERS
          limit: 1
        retargetInterval: 20
        followRange: 1024

alivePlayers:
  type: zombies.mob.validator.zombies_player
  states: [ zombies.player.state.alive ]
  blacklist: false

distanceCheck:
  type: mob.validator.distance
  distance: 15