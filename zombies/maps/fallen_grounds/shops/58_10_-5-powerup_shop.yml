id: phantazm:powerup_shop
trigger:
  origin: {x: 58, y: 10, z: -5}
  lengths: {x: 1, y: 1, z: 1}
predicateEvaluation: ALL_TRUE
data:
  predicates:
    - type: zombies.map.shop.predicate.player_state
      states: [ zombies.player.state.alive ]
      blacklist: false

    - type: zombies.map.shop.predicate.in_game

    - type: zombies.map.shop.predicate.type
      types: [ zombies.map.shop.interaction.right_click_block ]
      blacklist: false
  successInteractors:
    - type: zombies.map.shop.interactor.conditional
      evaluation: ALL_TRUE
      predicates:
        - type: zombies.map.shop.predicate.map_flag
          flag: zombies.map.flag.power
          requireAbsent: false
      successInteractors:
        - type: zombies.map.shop.interactor.open_gui
          title: "Powerup Shop"
          inventoryType: CHEST_3_ROW
          dynamic: false
          guiItems:
            - type: zombies.map.shop.gui.click_handler.interacting
              clickTypes: [ LEFT_CLICK ]
              blacklist: false
              updatingItem:
                type: item.updating.static
                item:
                  material: 'minecraft:arrow'
                  displayName: "<!i><blue><b>Max Ammo</b></blue>"
                  lore:
                    - '<!i><#9096ad>Finally, cheap ammo refills in Fallen Grounds.</#9096ad></!i>'
                    - '<!i><#9096ad>This doesn''t feel like the same game.</#9096ad></!i>'
                    - ''
                    - '<!i><#9096ad><b>Cost<#b8bfde>:</#b8bfde> <gold>1000 Coins</gold></b></#9096ad></!i>'

              clickInteractor:
                type: zombies.map.shop.interactor.conditional
                evaluation: ALL_TRUE
                predicates:
                  - type: zombies.map.shop.predicate.static_cost
                    cost: 1000
                    modifierType: coin_spend.shop
                successInteractors:
                  - type: zombies.map.shop.interactor.spawn_powerup
                    coordinate: { x: 58, y: 9, z: -6 }
                    powerup: 'phantazm:max_ammo'

                  - type: zombies.map.shop.interactor.play_sound
                    sound: { name: 'minecraft:entity.firework_rocket.twinkle', source: PLAYER,
                             volume: 10.0,
                             pitch: 1.0 }
                    broadcast: true

                  - type: zombies.map.shop.interactor.deduct_coins
                    cost: 1000
                    modifierType: coin_spend.shop

                  - type: zombies.map.shop.interactor.messaging
                    messages: [ '<#9096ad><sender> bought <blue><b>Max Ammo</b></blue> from the <yellow>Powerup Shop</yellow>!<#9096ad>' ]
                    broadcast: true
                failureInteractors:
                  - type: zombies.map.shop.interactor.messaging
                    messages: [ "<red>You do not have enough coins to purchase this!" ]
                    broadcast: false

                  - type: zombies.map.shop.interactor.play_sound
                    sound: { name: 'minecraft:entity.enderman.teleport', source: PLAYER, volume: 10.0,
                             pitch: 0.0 }
                    broadcast: false

            - type: zombies.map.shop.gui.click_handler.interacting
              clickTypes: [ LEFT_CLICK ]
              blacklist: false
              updatingItem:
                type: item.updating.static
                item:
                  material: 'minecraft:raw_gold'
                  displayName: "<!i><gold><b>Double Coins</b></gold>"
                  lore:
                    - '<!i><#9096ad>Sacrifice your money so your teammates</#9096ad></!i>'
                    - '<!i><#9096ad>get a boost. Is this philanthropy?</#9096ad></!i>'
                    - ''
                    - '<!i><#9096ad><b>Cost<#b8bfde>:</#b8bfde> <gold>2500 Coins</gold></b></#9096ad></!i>'

              clickInteractor:
                type: zombies.map.shop.interactor.conditional
                evaluation: ALL_TRUE
                predicates:
                  - type: zombies.map.shop.predicate.static_cost
                    cost: 2500
                    modifierType: coin_spend.shop
                successInteractors:
                  - type: zombies.map.shop.interactor.spawn_powerup
