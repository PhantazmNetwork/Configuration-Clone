round: 16
startActions:
  - type: zombies.map.round.action.announce
    format: <red>Round <round>
    destination: TITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.announce
    format: ""
    destination: SUBTITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.revive_players

  - type: zombies.map.round.action.play_sound
    sound: { name: 'minecraft:entity.wither.spawn', source: MASTER, volume: 24.0,
             pitch: 0.5 }
endActions: [ ]
waves:
  - delayTicks: 160
    spawns:
      - id: civilian
        spawnType: window
        amount: 5
      - id: banshee
        spawnType: window
        amount: 4
    spawnActions:
      - type: zombies.map.wave.action.select_powerup
        powerups: [ "landmine" ]
  - delayTicks: 280
    spawns:
      - id: civilian
        spawnType: window
        amount: 6
      - id: banshee
        spawnType: window
        amount: 6
    spawnActions:
      - type: zombies.map.wave.action.select_powerup
        powerups: [ "landmine" ]
  - delayTicks: 280
    spawns:
      - id: civilian
        spawnType: window
        amount: 4
      - id: banshee
        spawnType: window
        amount: 6
    spawnActions:
      - type: zombies.map.wave.action.select_powerup
        powerups: [ "landmine" ]

