key: maniac_infernal
type: minecraft:zombie
pathfinding:
  type: proxima.path_settings.ground
  jumpHeight: 1.6
  fallTolerance: 6
  stepHeight: 0.5

showNameTag: true

meta:
  customName: <red><b>Maniac</b></red>
  customNameVisible: true

extra:
  resistInstakill: true
  resistFire: true
  resistSlowDown: true
  announceKill: true

equipment:
  MAIN_HAND: '{id:"red_dye",Count:1}'
  OFF_HAND: '{id:"red_dye",Count:1}'
  BOOTS: '{id:"iron_boots",Count:1}'
  LEGGINGS: '{id:"iron_leggings",Count:1}'
  CHESTPLATE: '{id:"leather_chestplate",Count:1,tag:{display:{color:7675950}}}'
  HELMET: '{id:"player_head",Count:1,tag:{display:{Name:"{\"text\":\"Maniac\"}"},SkullOwner:{Id:[I;2038863444,-1634057769,-1154013769,194595426],Properties:{textures:[{Value:"eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvZmE1MmE0MDMzOWRjNTdjOGE2YmZmMWVhMjI3ZGJkN2QyYjUyYmI4YzJmN2M5NzExMjYyZjI3NjQ5NzAwYWJlNiJ9fX0="}]}}}}'


attributes:
  generic.max_health: 1250
  generic.movement_speed: 0.34
  generic.attack_damage: 4
  generic.armor: 8
  generic.attack_knockback: 0.3
  generic.knockback_resistance: 0.75

skills:
  - type: mob.skill.send_message
    trigger: SPAWN
    message: <yellow><#3410ad><b>INFERNAL</b></#3410ad> <red><b>Maniac</b></red> has spawned!</yellow>
    selector:
      type: mob.selector.entities_in_area
      originSelector:
        type: mob.selector.self
      validator:
        type: mob.validator.always
      target: PLAYERS

  - type: mob.skill.play_sound
    trigger: SPAWN
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.lightning_bolt.thunder', source: PLAYER, volume: 100.0, pitch: 1.0 }

  - type: mob.skill.play_sound
    trigger: DAMAGED
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.zombie.hurt', source: HOSTILE, volume: 1.5, pitch: 1.0 }

  - type: mob.skill.play_sound
    trigger: DEATH
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.zombie.death', source: HOSTILE, volume: 1.5, pitch: 1.0 }

  - type: mob.skill.show_healthbar
    bar: '<#6b6f80>[<healthbar:bar_component:|:color_start:#dd3e28:color_end:#34bf25:missing_color:gray>]</#6b6f80>'
    barWidth: 20

  - type: mob.skill.random_timer
    minInterval: 100
    maxInterval: 160
    delegate:
      type: mob.skill.random
      chance: 0.5
      delegate:
        type: mob.skill.play_sound
        selector:
          type: mob.selector.self
        sound: { name: 'minecraft:entity.zombie.ambient', source: HOSTILE, volume: 1.5, pitch: 1.0 }

  - type: mob.skill.timer
    interval: 180
    delegate:
      type: mob.skill.group
      delegates:
        - type: mob.skill.temporal
          minDuration: 40
          maxDuration: 40
          delegate:
            type: mob.skill.attribute_modifying
            attribute: generic.movement_speed
            amount: 0.6
            attributeOperation: ADDITION
            selector:
              type: mob.selector.self

        - type: mob.skill.temporal
          minDuration: 40
          maxDuration: 40
          delegate:
            type: mob.skill.attribute_modifying
            attribute: phantazm.attack_speed_multiplier
            amount: 0.6
            attributeOperation: ADDITION
            selector:
              type: mob.selector.self

  - type: mob.skill.random_timer
    minInterval: 200
    maxInterval: 280
    delegate:
      type: mob.skill.group
      delegates:
        - type: mob.skill.temporal
          minDuration: 100
          maxDuration: 100
          delegate:
            type: mob.skill.attribute_modifying
            attribute: phantazm.gun_damage
            amount: -0.4
            attributeOperation: MULTIPLY_TOTAL
            stage: zombies_game
            selector:
              type: mob.selector.entities_in_area
              originSelector:
                type: mob.selector.self
              validator: /alivePlayers
              target: PLAYERS

        - type: mob.skill.play_sound
          selector:
            type: mob.selector.self
          sound: { name: 'minecraft:entity.ender_dragon.growl', source: HOSTILE, volume: 12.0, pitch: 1.0 }

goals:
  - type: mob.goal_applier.collection
    goalCreators:
      - type: zombies.mob.goal.break_window
        breakTicks: 15
        breakCount: 1
        breakRadius: 0.5

  - type: mob.goal_applier.collection
    goalCreators:
      - type: mob.goal.melee_attack
        cooldown: 20
        range: 0.25
        bypassArmor: true

      - type: mob.goal.follow_entity
        selector:
          type: mob.selector.entities_in_area
          originSelector:
            type: mob.selector.self
          validator: /alivePlayers
          target: PLAYERS
          limit: 1
        retargetInterval: 20
        followRange: 1024

alivePlayers:
  type: zombies.mob.validator.zombies_player
  states: [ zombies.player.state.alive ]
  blacklist: false