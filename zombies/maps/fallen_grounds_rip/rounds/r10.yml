round: 10
startActions:
  - type: zombies.map.round.action.announce
    format: <red>Round <round>
    destination: TITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.announce
    format: ""
    destination: SUBTITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.revive_players

  - type: zombies.map.round.action.play_sound
    sound: { name: 'minecraft:entity.wither.spawn', source: MASTER, volume: 24.0,
             pitch: 0.5 }
endActions:
  - type: zombies.map.round.action.announce
    format: <gradient:#616575:#4a4c59><st>⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯</st></gradient><br><#fffa9e>»</#fffa9e> <#9096ad>You completed <b><green>Round <round></green></b> in <b><red><time></red></b><#b8bfde>!</#b8bfde></#9096ad><br><gradient:#616575:#4a4c59><st>⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯</st></gradient>
    destination: CHAT
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false
waves:
  - delayTicks: 160
    spawns:
      - id: civilian_rip
        spawnType: window
        amount: 8
      - id: runner_rip
        spawnType: window
        amount: 6
      - id: bloated_rip
        spawnType: window
        amount: 2
      - id: police_officer_rip
        spawnType: window
        amount: 6
    spawnActions: [ ]
  - delayTicks: 260
    spawns:
      - id: civilian_rip
        spawnType: window
        amount: 6
      - id: bloated_rip
        spawnType: window
        amount: 3
      - id: runner_rip
        spawnType: window
        amount: 8
    spawnActions: [ ]
  - delayTicks: 270
    spawns:
      - id: bloated_rip
        spawnType: window
        amount: 3
      - id: ram_rip
        spawnType: window
        amount: 4
      - id: riot_police_rip
        spawnType: window
        amount: 5
      - id: police_officer_rip
        spawnType: window
        amount: 3
      - id: civilian_rip
        spawnType: window
        amount: 2
    spawnActions: [ ]
