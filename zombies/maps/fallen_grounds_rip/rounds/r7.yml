round: 7
startActions:
  - type: zombies.map.round.action.announce
    format: <red>Round <round>
    destination: TITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.announce
    format: ""
    destination: SUBTITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.revive_players

  - type: zombies.map.round.action.play_sound
    sound: { name: 'minecraft:entity.wither.spawn', source: MASTER, volume: 24.0,
             pitch: 0.5 }
endActions: [ ]
waves:
  - delayTicks: 160
    spawns:
      - id: civilian_rip
        spawnType: window
        amount: 6
      - id: runner_rip
        spawnType: window
        amount: 4
    spawnActions: [ ]
  - delayTicks: 270
    spawns:
      - id: civilian_rip
        spawnType: window
        amount: 6
      - id: runner_rip
        spawnType: window
        amount: 4
      - id: riot_police_rip
        spawnType: window
        amount: 2
    spawnActions: [ ]
  - delayTicks: 260
    spawns:
      - id: civilian_rip
        spawnType: window
        amount: 8
      - id: runner_rip
        spawnType: window
        amount: 8
      - id: riot_police_rip
        spawnType: window
        amount: 8
      - id: banshee_rip
        spawnType: window
        amount: 8
    spawnActions: [ ]
