key: gravity_node_infernal
type: minecraft:zombie
pathfinding:
  type: proxima.path_settings.ground
  jumpHeight: 1.25
  fallTolerance: 6
  stepHeight: 3.0

meta:
  customName: <black>Gravity Node</black>
  isBaby: true

equipment:
  BOOTS: '{id:"netherite_boots",Count:1}'
  LEGGINGS: '{id:"netherite_leggings",Count:1}'
  CHESTPLATE: '{id:"netherite_chestplate",Count:1}'
  HELMET: '{id:"polished_blackstone",Count:1}'

attributes:
  generic.max_health: 55
  generic.movement_speed: 0.37
  generic.attack_damage: 11
  generic.armor: 12
  generic.attack_knockback: 0.2
  generic.knockback_resistance: 0.75
  phantazm.hitbox_expand: 0.4

skills:
  - type: mob.skill.play_sound
    trigger: DAMAGED
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:block.note_block.didgeridoo', source: HOSTILE, volume: 2.0, pitch: 0.5 }

  - type: mob.skill.play_sound
    trigger: DEATH
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:item.shield.block', source: HOSTILE, volume: 2.0, pitch: 0.5 }

  - type: mob.skill.spawn_particle
    trigger: DEATH
    selector:
      type: mob.selector.self
    particle:
      type: particle.wrapper
      particle: smoke
      variantData:
        type: particle.variant_data.none
      distance: true
      offsetX: 4.0
      offsetY: 4.0
      offsetZ: 4.0
      data: 0.0
      particleCount: 50
    bounds:
      origin:
        x: 0.0
        y: 1.0
        z: 0.0
      lengths:
        x: 0.0
        y: 0.0
        z: 0.0

  - type: mob.skill.random_timer
    minInterval: 100
    maxInterval: 160
    delegate:
      type: mob.skill.random
      chance: 0.5
      delegate:
        type: mob.skill.play_sound
        selector:
          type: mob.selector.self
        sound: { name: 'minecraft:block.lava.extinguish', source: HOSTILE, volume: 2.0, pitch: 0.5 }

  - type: mob.skill.timer
    interval: 2
    delegate:
      type: mob.skill.push
      power: -0.15
      vertical: 0
      additive: true
      selector:
        type: mob.selector.entities_in_area
        originSelector:
          type: mob.selector.self
        range: 6
        target: LIVING_ENTITIES
        validator: /alivePlayers

goals:
  - type: mob.goal_applier.collection
    goalCreators:
      - type: zombies.mob.goal.break_window
        breakTicks: 15
        breakCount: 2
        breakRadius: 0.5

  - type: mob.goal_applier.collection
    goalCreators:
      - type: mob.goal.melee_attack
        cooldown: 20
        range: 0.25

      - type: mob.goal.follow_entity
        selector:
          type: mob.selector.entities_in_area
          originSelector:
            type: mob.selector.self
          validator: /alivePlayers
          target: PLAYERS
          limit: 1
        retargetInterval: 20
        followRange: 1024

alivePlayers:
  type: zombies.mob.validator.zombies_player
  states: [ zombies.player.state.alive ]
  blacklist: false