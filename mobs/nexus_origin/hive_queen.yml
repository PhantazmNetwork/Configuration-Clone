# mechanically unfinished
key: hive_queen
type: minecraft:skeleton
pathfinding:
  type: proxima.path_settings.ground
  jumpHeight: 2.5
  fallTolerance: 10
  stepHeight: 2.0

showNameTag: true

meta:
  customName: <#00fff7><b>Hive Queen</b></#00fff7>
  customNameVisible: true

extra:
  resistInstakill: true
  announceKill: true

equipment:
  BOOTS: '{id:"leather_boots",Count:1,tag:{display:{color:3065292}}}'
  LEGGINGS: '{id:"leather_leggings",Count:1,tag:{display:{color:3065292}}}'
  CHESTPLATE: '{id:"leather_chestplate",Count:1,tag:{display:{color:3065292}}}'
  HELMET: '{id:"player_head",Count:1,tag:{display:{Name:"{\"text\":\"Allay\"}"},SkullOwner:{Id:[I;1757596527,-1713617369,-1610464598,1939235283],Properties:{textures:[{Value:"eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvZTU1Mjc3Mjc3MDlmMDhiYjVmOTFhYWM4NTBmZTZmOTQ0YzViYzM0OGEwODBiM2I1NjNkNDQ5YzcyYjgxYmY4NiJ9fX0="}]}}}}'

attributes:
  generic.max_health: 1400
  generic.movement_speed: 0.22
  generic.attack_damage: 6
  generic.armor: 18
  generic.attack_knockback: 0.25

skills:
  - type: mob.skill.send_message
    trigger: SPAWN
    message: <yellow><#00fff7><b>Hive Queen</b></#00fff7> has spawned!</yellow>
    selector:
      type: mob.selector.entities_in_area
      originSelector:
        type: mob.selector.self
      validator:
        type: mob.validator.always
      target: PLAYERS

  - type: mob.skill.play_sound
    trigger: SPAWN
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.lightning_bolt.thunder', source: PLAYER, volume: 100.0, pitch: 1.0 }

  - type: mob.skill.play_sound
    trigger: DAMAGED
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.warden.agitated', source: HOSTILE, volume: 1.5, pitch: 1.9 }

  - type: mob.skill.play_sound
    trigger: DEATH
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.warden.death', source: HOSTILE, volume: 1.5, pitch: 1.8 }

  - type: mob.skill.show_healthbar
    bar: '<#6b6f80>[<healthbar:bar_component:|:color_start:#001635:color_end:#75fff4:missing_color:gray>]</#6b6f80>'
    barWidth: 20

  - type: mob.skill.random_timer
    minInterval: 100
    maxInterval: 160
    delegate:
      type: mob.skill.random
      chance: 0.5
      delegate:
        type: mob.skill.play_sound
        selector:
          type: mob.selector.self
        sound: { name: 'minecraft:entity.warden.tendril_clicks', source: HOSTILE, volume: 1.5, pitch: 0.5 }

goals:
  - type: mob.goal_applier.collection
    goalCreators:
      - type: zombies.mob.goal.break_window
        breakTicks: 20
        breakCount: 1
        breakRadius: 0.5

  - type: mob.goal_applier.collection
    goalCreators:
      - type: mob.goal.melee_attack
        cooldown: 20
        range: 0.25

      - type: mob.goal.follow_entity
        selector:
          type: mob.selector.entities_in_area
          originSelector:
            type: mob.selector.self
          validator: /alivePlayers
          target: PLAYERS
          limit: 1
        retargetInterval: 20
        followRange: 1024

alivePlayers:
  type: zombies.mob.validator.zombies_player
  states: [ zombies.player.state.alive ]
  blacklist: false