round: 12
startActions:
  - type: zombies.map.round.action.announce
    format: <red>Round <round>
    destination: TITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.announce
    format: ""
    destination: SUBTITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.revive_players

  - type: zombies.map.round.action.play_sound
    sound: { name: 'minecraft:entity.wither.spawn', source: MASTER, volume: 24.0,
             pitch: 0.5 }
endActions: [ ]
waves:
  - delayTicks: 150
    spawns:
      - id: civilian
        spawnType: window
        amount: 3
      - id: riot_police
        spawnType: window
        amount: 5
    spawnActions: [ ]
  - delayTicks: 260
    spawns:
      - id: civilian
        spawnType: window
        amount: 5
      - id: riot_police
        spawnType: window
        amount: 2
      - id: bloated
        spawnType: window
        amount: 2
    spawnActions:
      - type: zombies.map.wave.action.select_powerup
        powerups: [ "insta_kill" ]
  - delayTicks: 280
    spawns:
      - id: civilian
        spawnType: window
        amount: 3
      - id: riot_police
        spawnType: window
        amount: 3
      - id: bloated
        spawnType: window
        amount: 4
    spawnActions: [ ]
