round: 6
startActions:
  - type: zombies.map.round.action.announce
    format: <red>Round <round>
    destination: TITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.announce
    format: ""
    destination: SUBTITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.revive_players

  - type: zombies.map.round.action.play_sound
    sound: { name: 'minecraft:entity.wither.spawn', source: MASTER, volume: 24.0,
             pitch: 0.5 }
endActions: [ ]
waves:
  - delayTicks: 140
    spawns:
      - id: civilian_rip
        spawnType: window
        amount: 8
    spawnActions: [ ]
  - delayTicks: 270
    spawns:
      - id: civilian_rip
        spawnType: window
        amount: 6
      - id: runner_rip
        spawnType: window
        amount: 10
    spawnActions: [ ]
  - delayTicks: 270
    spawns:
      - id: civilian_rip
        spawnType: window
        amount: 3
      - id: runner_rip
        spawnType: window
        amount: 10
      - id: police_officer_rip
        spawnType: window
        amount: 3
    spawnActions: [ ]
