key: tumor_infernal
type: minecraft:tadpole
pathfinding:
  type: proxima.path_settings.ground
  jumpHeight: 1.25
  fallTolerance: 4
  stepHeight: 0.5

meta:
  customName: <#56483b>Tumor</#56483b>

attributes:
  generic.max_health: 10
  generic.movement_speed: 0.4
  generic.attack_damage: 3
  generic.armor: 0
  generic.attack_knockback: 0.2

skills:
  - type: mob.skill.group
    trigger: ATTACK
    delegates:
      - type: mob.skill.temporal
        minDuration: 50
        maxDuration: 50
        delegate:
          type: mob.skill.attribute_modifying
          attribute: phantazm.gun_fire_delay
          amount: 1.0
          attributeOperation: MULTIPLY_TOTAL
          stage: zombies_game
          selector:
            type: mob.selector.last_hit
      - type: mob.skill.potion
        selector:
          type: mob.selector.last_hit
        potion:
          effect: minecraft:weakness
          amplifier: 1
          duration: 50
          flags: 4

  - type: mob.skill.play_sound
    trigger: DAMAGED
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:block.frogspawn.hatch', source: HOSTILE, volume: 1.5, pitch: 0.7 }

  - type: mob.skill.play_sound
    trigger: DEATH
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.tadpole.flop', source: HOSTILE, volume: 1.5, pitch: 0.7 }

goals:
  - type: mob.goal_applier.collection
    goalCreators:
      - type: mob.goal.melee_attack
        cooldown: 20
        range: 0.25

      - type: mob.goal.follow_entity
        selector:
          type: mob.selector.entities_in_area
          originSelector:
            type: mob.selector.self
          validator: /alivePlayers
          target: PLAYERS
          limit: 1
        retargetInterval: 20
        followRange: 1024

alivePlayers:
  type: zombies.mob.validator.zombies_player
  states: [ zombies.player.state.alive ]
  blacklist: false