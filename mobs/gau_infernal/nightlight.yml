# Run them over
key: nightlight_infernal
type: minecraft:drowned
pathfinding:
  type: proxima.path_settings.ground
  jumpHeight: 1.25
  fallTolerance: 4
  stepHeight: 0.5

showNameTag: true

meta:
  customName: <aqua><b>Nightlight</b></aqua>
  customNameVisible: true
  isGlowing: true

extra:
  resistInstakill: true
  resistFire: true
  resistSlowDown: true
  announceKill: true

equipment:
  MAIN_HAND: '{id:"nether_star",Count:1}'
  OFF_HAND: '{id:"nether_star",Count:1}'
  BOOTS: '{id:"chainmail_boots",Count:1}'
  LEGGINGS: '{id:"chainmail_leggings",Count:1}'
  HELMET: '{id:"player_head",Count:1,tag:{display:{Name:"{\"text\":\"Glowing Skeleton\"}"},SkullOwner:{Id:[I;-535237157,1476087147,-1761214431,-148423983],Properties:{textures:[{Value:"eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvZWUwNjkwMmIyNGFiMDUyODRlZDEzMmM1ZDg1MTAxMDk2NDAwMjI2MGE2NTY1MzRhYTQyMGU0YTY4ZGQzMjdiMiJ9fX0="}]}}}}'


attributes:
  generic.max_health: 3300
  generic.movement_speed: 0.39
  generic.attack_damage: 14
  generic.armor: 18
  generic.attack_knockback: 0.2
  generic.knockback_resistance: 0.9

skills:
  - type: mob.skill.send_message
    trigger: SPAWN
    message: <yellow><#3410ad><b>INFERNAL</b></#3410ad> <aqua><b>Nightlight</b></aqua> has spawned!</yellow>
    selector:
      type: mob.selector.entities_in_area
      originSelector:
        type: mob.selector.self
      validator:
        type: mob.validator.always
      target: PLAYERS

  - type: mob.skill.play_sound
    trigger: SPAWN
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.lightning_bolt.thunder', source: PLAYER, volume: 100.0, pitch: 1.0 }

  - type: mob.skill.timer
    trigger: SPAWN
    interval: 2
    delegate:
      type: mob.skill.attribute_modifying
      attribute: generic.movement_speed
      amount: -0.2
      attributeOperation: MULTIPLY_TOTAL
      stage: zombies_game
      selector:
        type: mob.selector.entities_in_area
        originSelector:
          type: mob.selector.self
        validator:
          type: mob.validator.mob
        target: LIVING_ENTITIES

  - type: mob.skill.play_sound
    trigger: DAMAGED
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.drowned.hurt', source: HOSTILE, volume: 1.5, pitch: 1.0 }

  - type: mob.skill.play_sound
    trigger: DEATH
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.drowned.death', source: HOSTILE, volume: 1.5, pitch: 1.0 }

  - type: mob.skill.show_healthbar
    bar: '<#6b6f80>[<healthbar:bar_component:|:color_start:#dd3e28:color_end:#34bf25:missing_color:gray>]</#6b6f80>'
    barWidth: 20

  - type: mob.skill.random_timer
    minInterval: 100
    maxInterval: 160
    delegate:
      type: mob.skill.random
      chance: 0.5
      delegate:
        type: mob.skill.play_sound
        selector:
          type: mob.selector.self
        sound: { name: 'minecraft:entity.drowned.say', source: HOSTILE, volume: 1.5, pitch: 1.0 }

  - type: mob.skill.timer
    interval: 5
    delegate:
      type: mob.skill.group
      delegates:
        - type: mob.skill.potion
          selector:
            type: mob.selector.entities_in_area
            originSelector:
              type: mob.selector.self
            validator: /alivePlayers
            target: PLAYERS
          potion:
            effect: minecraft:darkness
            amplifier: 1
            duration: 60
            flags: 6

        - type: mob.skill.potion
          selector:
            type: mob.selector.entities_in_area
            originSelector:
              type: mob.selector.self
            validator: /alivePlayers
            target: PLAYERS
          potion:
            effect: minecraft:blindness
            amplifier: 1
            duration: 60
            flags: 6

        - type: mob.skill.potion
          selector:
            type: mob.selector.entities_in_area
            originSelector:
              type: mob.selector.self
            range: 10
            validator: /alivePlayers
            target: PLAYERS
          potion:
            effect: minecraft:weakness
            amplifier: 1
            duration: 60
            flags: 6

        - type: mob.skill.temporal
          minDuration: 20
          maxDuration: 20
          delegate:
            type: mob.skill.attribute_modifying
            attribute: phantazm.gun_fire_delay
            amount: 0.3
            attributeOperation: MULTIPLY_TOTAL
            stage: zombies_game
            selector:
              type: mob.selector.entities_in_area
              originSelector:
                type: mob.selector.self
              range: 10
              validator: /alivePlayers
              target: PLAYERS

  - type: mob.skill.timer
    interval: 100
    delegate:
      type: mob.skill.group
      delegates:
        - type: mob.skill.spawn_particle
          selector:
            type: mob.selector.self
          particle:
            type: particle.wrapper
            particle: glow_squid_ink
            variantData:
              type: particle.variant_data.none
            distance: true
            offsetX: 2.5
            offsetY: 1.0
            offsetZ: 2.5
            data: 0.0
            particleCount: 60
          bounds:
            origin:
              x: 0.0
              y: 0.5
              z: 0.0
            lengths:
              x: 0.0
              y: 0.0
              z: 0.0

        - type: mob.skill.damage_over_time
          selector:
            type: mob.selector.entities_in_area
            originSelector:
              type: mob.selector.self
            range: 7
            target: LIVING_ENTITIES
            validator: /alivePlayers
          validator: /alivePlayers
          damageAmount: 3.32
          bypassArmor: true
          damageInterval: 12
          damageTime: 132

        - type: mob.skill.potion
          selector:
            type: mob.selector.entities_in_area
            originSelector:
              type: mob.selector.self
            range: 7
            target: LIVING_ENTITIES
            validator: /alivePlayers
          potion:
            effect: minecraft:poison
            amplifier: 1
            duration: 132
            flags: 6

        - type: mob.skill.temporal
          minDuration: 300
          maxDuration: 300
          delegate:
            type: mob.skill.attribute_modifying
            attribute: phantazm.gun_damage
            amount: -0.5
            attributeOperation: ADDITION
            stage: zombies_game
            selector:
              type: mob.selector.entities_in_area
              originSelector:
                type: mob.selector.self
              range: 7
              target: LIVING_ENTITIES
              validator: /alivePlayers

goals:
  - type: mob.goal_applier.collection
    goalCreators:
      - type: zombies.mob.goal.break_window
        breakTicks: 20
        breakCount: 1
        breakRadius: 0.5

  - type: mob.goal_applier.collection
    goalCreators:
      - type: mob.goal.melee_attack
        cooldown: 20
        range: 0.25

      - type: mob.goal.follow_entity
        selector:
          type: mob.selector.entities_in_area
          originSelector:
            type: mob.selector.self
          validator: /alivePlayers
          target: PLAYERS
          limit: 1
        retargetInterval: 20
        followRange: 1024

alivePlayers:
  type: zombies.mob.validator.zombies_player
  states: [ zombies.player.state.alive ]
  blacklist: false