round: 22
startActions:
  - type: zombies.map.round.action.announce
    format: <red>Round <round>
    destination: TITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.announce
    format: ""
    destination: SUBTITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.revive_players

  - type: zombies.map.round.action.play_sound
    sound: { name: 'minecraft:entity.wither.spawn', source: MASTER, volume: 24.0,
             pitch: 0.5 }
endActions: [ ]
# 72
waves:
  - delayTicks: 130
    spawns:
      - id: dried_undead
        spawnType: window
        amount: 15
    spawnActions:
      - type: zombies.map.wave.action.select_powerup
        powerups: [ "overclock" ]
  - delayTicks: 280
    spawns:
      - id: dried_undead
        spawnType: window
        amount: 17
      - id: spitter
        spawnType: window
        amount: 18
    spawnActions: [ ]
  - delayTicks: 280
    spawns:
      - id: dried_undead
        spawnType: window
        amount: 22
    spawnActions: [ ]