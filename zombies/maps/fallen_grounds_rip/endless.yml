type: zombies.endless.basic
healthScaling:
  kind: LINEAR_SINUSOIDAL
  ceiling: 450
  a: 4.2
  b: 8.2

damageScaling:
  kind: LINEAR_SINUSOIDAL
  ceiling: 5
  a: 3.7
  b: 0.22

speedScaling:
  kind: LINEAR
  ceiling: 0.25
  a: 0.002

spawnAmountScaling:
  kind: LINEAR_SINUSOIDAL
  ceiling: 250
  a: 8.9
  b: 10
spawnAmountBase: 101

waveScaling:
  kind: LINEAR
  ceiling: 3
  a: 0.025
waveBase: 3
waveDelayBase: 200
waveWeightBase: 1

introductions:

  - spawns:
      - key: phantazm:police_chief_endless-fgr
        spawnType: window
        weight: 4
    startRound: 25
    period: 10
    count: -1

  - spawns:
      - key: phantazm:ping-pong_bro_endless-fgr
        spawnType: window
        weight: 3
    startRound: 45
    period: 3
    count: -1

  - spawns:
      - key: phantazm:broodmother_endless-fgr
        spawnType: window
        weight: 3
      - key: phantazm:bloated_piglet_endless-fgr
        spawnType: window
        weight: 50
    startRound: 50
    period: 10
    count: -1

  - spawns:
      - key: phantazm:dumpster_diver_endless-fgr
        spawnType: window
        weight: 3
    startRound: 69
    period: 9
    count: -1

themes:
  # 1
  - type: zombies.endless.basic.theme
    mobs:
      - key: phantazm:civilian_rip
        spawnType: window
        weight: 115
      - key: phantazm:bloated_rip
        spawnType: window
        weight: 80
      - key: phantazm:runner_rip
        spawnType: window
        weight: 80
    waveWeight:
      kind: LINEAR
      ceiling: 5
      a: 0.2
    baseWaveDelayTicks:
      kind: LINEAR_SINUSOIDAL
      ceiling: 0
      floor: -200
      a: 9.2
      b: -13.5
    offsetWaveDelayTicks:
      kind: LINEAR
      ceiling: 200
      floor: 20
      a: 50
    waveActions:
      - type: zombies.endless.basic.wave_actions
        wave: 1
        spawnActions:
          - type: zombies.map.wave.action.select_powerup
            powerups: [ 'phantazm:insta_kill' ]
    startActions:
      - type: zombies.map.round.action.announce
        format: <red>Round <round>
        destination: TITLE
        tickFormatter:
          type: core.tick_formatter.analog
          ceil: false

      - type: zombies.map.round.action.announce
        format: ""
        destination: SUBTITLE
        tickFormatter:
          type: core.tick_formatter.analog
          ceil: false

      - type: zombies.map.round.action.revive_players

      - type: zombies.map.round.action.play_sound
        sound: { name: 'minecraft:entity.wither.spawn', source: MASTER, volume: 24.0,
                 pitch: 0.5 }
    endActions: [ ]
