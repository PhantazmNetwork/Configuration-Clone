round: 6
startActions:
  - type: zombies.map.round.action.announce
    format: <red>Round <round>
    destination: TITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.announce
    format: ""
    destination: SUBTITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.revive_players

  - type: zombies.map.round.action.play_sound
    sound: { name: 'minecraft:entity.wither.spawn', source: MASTER, volume: 24.0,
             pitch: 0.5 }
endActions: [ ]
waves:
  - delayTicks: 150
    spawns:
      - id: hazmat_zombie
        spawnType: window
        amount: 5
    spawnActions:
      - type: zombies.map.wave.action.select_powerup
        powerups: [ "insta_kill" ]
  - delayTicks: 250
    spawns:
      - id: hazmat_zombie
        spawnType: window
        amount: 4
      - id: turned_worker
        spawnType: window
        amount: 3
    spawnActions: [ ]
  - delayTicks: 250
    spawns:
      - id: hazmat_zombie
        spawnType: window
        amount: 6
    spawnActions: [ ]