key: police_chief_fge
type: minecraft:skeleton
tags: [ endless, boss ]
pathfinding:
  type: proxima.path_settings.ground
  jumpHeight: 1.25
  fallTolerance: 6
  stepHeight: 0.5
  targetDeviation: 10

showNameTag: true

meta:
  customName: <blue><b>Police Chief</b></blue>
  customNameVisible: true

extra:
  resistInstakill: true
  announceKill: true
  endlessHealthScaling:
    kind: LINEAR
    ceiling: 2147483647
    a: 5

equipment:
  MAIN_HAND: '{id:"wooden_hoe",Count:1}'
  BOOTS: '{id:"leather_boots",Count:1,tag:{display:{color:21197}}}'
  LEGGINGS: '{id:"leather_leggings",Count:1,tag:{display:{color:21197}}}'
  CHESTPLATE: '{id:"leather_chestplate",Count:1,tag:{display:{color:21197}}}'
  HELMET: '{id:"player_head",Count:1,tag:{display:{Name:"{\"text\":\"Zombie\"}"},SkullOwner:{Id:[I;-1038045778,1762869602,-1269230612,-367931129],Properties:{textures:[{Value:"eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvMzI1MTdmYWE5YzE3MTVmM2E4ZTJkMzExYTRjNjQ3MTE3ZmRlOTVjZWNhODk1MTg3MzU4Njg3NmI3NDg4NGNjMyJ9fX0="}]}}}}'

attributes:
  generic.max_health: 450
  generic.movement_speed: 0.2
  generic.armor: 10
  generic.knockback_resistance: 0.5

skills:
  - type: mob.skill.send_message
    trigger: SPAWN
    message: <yellow><blue><b>Police Chief</b></blue> has spawned!</yellow>
    selector:
      type: mob.selector.entities_in_area
      originSelector:
        type: mob.selector.self
      validator:
        type: mob.validator.always
      target: PLAYERS

  - type: mob.skill.play_sound
    trigger: SPAWN
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.lightning_bolt.thunder', source: PLAYER, volume: 100.0, pitch: 1.0 }

  - type: mob.skill.play_sound
    trigger: DAMAGED
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.skeleton.hurt', source: HOSTILE, volume: 1.5, pitch: 1.0 }

  - type: mob.skill.play_sound
    trigger: DEATH
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.skeleton.death', source: HOSTILE, volume: 1.5, pitch: 1.0 }


  - type: mob.skill.show_healthbar
    bar: '<#6b6f80>[<healthbar:bar_component:|:color_start:#dd3e28:color_end:#34bf25:missing_color:gray>]</#6b6f80>'
    barWidth: 20

  - type: mob.skill.random_timer
    minInterval: 100
    maxInterval: 160
    delegate:
      type: mob.skill.random
      chance: 0.5
      delegate:
        type: mob.skill.play_sound
        selector:
          type: mob.selector.self
        sound: { name: 'minecraft:entity.skeleton.ambient', source: HOSTILE, volume: 1.5, pitch: 1.0 }

  - type: mob.skill.timer
    interval: 30
    delegate:
      type: mob.skill.group
      delegates:
        - type: mob.skill.temporal
          minDuration: 30
          maxDuration: 30
          delegate:
            type: mob.skill.attribute_modifying
            selector:
              type: mob.selector.entities_in_area
              originSelector:
                type: mob.selector.self
              range: 8
              target: LIVING_ENTITIES
              validator: /mobValidator
            shareKey: chief_knockback
            attribute: generic.attack_knockback
            amount: 0.3
            attributeOperation: ADDITION

        - type: mob.skill.temporal
          minDuration: 30
          maxDuration: 30
          delegate:
            type: mob.skill.attribute_modifying
            selector:
              type: mob.selector.entities_in_area
              originSelector:
                type: mob.selector.self
              range: 8
              target: LIVING_ENTITIES
              validator: /mobValidator
            shareKey: chief_damage
            attribute: generic.attack_damage
            amount: 1.0
            attributeOperation: MULTIPLY_BASE

        - type: mob.skill.temporal
          minDuration: 30
          maxDuration: 30
          delegate:
            type: mob.skill.attribute_modifying
            selector:
              type: mob.selector.entities_in_area
              originSelector:
                type: mob.selector.self
              range: 8
              target: LIVING_ENTITIES
              validator: /mobValidator
            shareKey: chief_headshot
            attribute: phantazm.gun_headshot_damage_received
            amount: -0.25
            attributeOperation: ADDITION

        - type: mob.skill.spawn_particle
          selector:
            type: mob.selector.self
          particle:
            type: particle.wrapper
            particle: dust
            variantData:
              type: particle.variant_data.dust
              color:
                r: 113
                g: 185
                b: 246
              size: 2
            distance: true
            offsetX: 0.3
            offsetY: 0.5
            offsetZ: 0.3
            data: 0.0
            particleCount: 8
          bounds:
            origin:
              x: 0.0
              y: 2.3
              z: 0.0
            lengths:
              x: 0.0
              y: 0.0
              z: 0.0


  - type: mob.skill.timer
    interval: 15
    delegate:
      type: mob.skill.group
      delegates:
        - type: mob.skill.shoot_projectile
          selector:
            type: mob.selector.pathfinding_target
          hitValidator:
            type: mob.validator.and
            validators: [ /alivePlayers, /distanceCheck ]
          callback:
            type: mob.skill.spawn_mob.callback.none
          entity: arrow_police
          power: 1.5
          spread: 0
          gravity: false

        - type: mob.skill.play_sound
          selector:
            type: mob.selector.self
          sound: { name: 'minecraft:entity.iron_golem.hurt', source: HOSTILE, volume: 1.5, pitch: 2.0 }

goals:
  - type: mob.goal_applier.collection
    goalCreators:
      - type: zombies.mob.goal.break_window
        breakTicks: 20
        breakCount: 1
        breakRadius: 0.5

  - type: mob.goal_applier.collection
    goalCreators:
      - type: mob.goal.follow_entity
        selector:
          type: mob.selector.entities_in_area
          originSelector:
            type: mob.selector.self
          validator:
            type: mob.validator.or
            validators: [ /alivePlayers, /targetableMobs ]
          target: LIVING_ENTITIES
          limit: 1
        retargetInterval: 20
        followRange: 1024

alivePlayers:
  type: zombies.mob.validator.zombies_player
  states: [ zombies.player.state.alive ]
  blacklist: false

targetableMobs:
  type: mob.validator.mob_type
  tags: [ ally_targetable ]
  blacklist: false

distanceCheck:
  type: mob.validator.distance
  distance: 15

mobValidator:
  type: mob.validator.mob_type
  tags: [ cop ]
  blacklist: false