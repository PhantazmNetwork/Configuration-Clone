round: 25
startActions:
  - type: zombies.map.round.action.announce
    format: <red>Round <round>
    destination: TITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.announce
    format: ""
    destination: SUBTITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.revive_players

  - type: zombies.map.round.action.play_sound
    sound: { name: 'minecraft:entity.wither.spawn', source: MASTER, volume: 24.0,
             pitch: 0.5 }
endActions: [ ]
# 44
waves:
  - delayTicks: 140
    spawns:
      - id: mutant
        spawnType: window
        amount: 8
    spawnActions:
      - type: zombies.map.wave.action.select_powerup
        powerups: [ "double_coins" ]
  - delayTicks: 250
    spawns:
      - id: mutant
        spawnType: window
        amount: 12
    spawnActions: [ ]
  - delayTicks: 250
    spawns:
      - id: mutant
        spawnType: window
        amount: 9
      - id: crazed_zombie
        spawnType: window
        amount: 14
      - id: maniac
        spawnType: window
        amount: 1
    spawnActions: [ ]