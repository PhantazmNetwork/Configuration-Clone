round: 2
startActions:
  - type: zombies.map.round.action.announce
    format: <red>Round <round>
    destination: TITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.announce
    format: ""
    destination: SUBTITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.revive_players

  - type: zombies.map.round.action.play_sound
    sound: { name: 'minecraft:entity.wither.spawn', source: MASTER, volume: 24.0,
             pitch: 0.5 }

  - type: zombies.map.round.action.select_bombed
    warningFormatMessage: '<#e6e2a3>»</#e6e2a3> <#4fb369><#9df5ab>Radioactive waste</#9df5ab> has leaked into <b><#6ce66c>Tunnel</#6ce66c></b>. Unfortunately,<br> the hazmat suits worn by the undead are unusable <st>⎯⎯</st> spend<br> as little time as possible in it unless you want to get sick.</#4fb369>'
    inAreaMessage: '<#e6e2a3>»</#e6e2a3> <#e64568>You''re growing weak from radiation sickness.<br><#e6e2a3>»</#e6e2a3> <b>Evacuate Tunnel IMMEDIATELY!</b></#e64568>'
    bombingDamageName: '<#4fb369>Radiation'
    damage: 4
    gracePeriod: 1
    effectDelay: 300
    damageDelay: 400
    damageInterval: 100
    warningMessageHits: 2
    duration: 1
    specificRoom: tunnel
    modifiers:
      - attribute: phantazm.gun_fire_delay
        amount: 0.6
        attributeOperation: MULTIPLY_BASE

      - attribute: phantazm.damage_multiplier
        amount: -0.6
        attributeOperation: MULTIPLY_BASE
    particle:
      type: particle.wrapper
      particle: scrape
      variantData:
        type: particle.variant_data.none
      distance: true
      offsetX: 0.1
      offsetY: 0.5
      offsetZ: 0.1
      data: 0
      particleCount: 4
    sound: { name: 'minecraft:ambient.basalt_deltas.additions', source: AMBIENT, volume: 0.75, pitch: 0.75 }
    soundInterval: 3

endActions: [ ]
# 19
waves:
  - delayTicks: 130
    spawns:
      - id: turned_worker_infernal
        spawnType: window
        amount: 5
    spawnActions:
      - type: zombies.map.wave.action.select_powerup
        powerups: [ "health_kit" ]
  - delayTicks: 240
    spawns:
      - id: hazmat_zombie_infernal
        spawnType: window
        amount: 6
    spawnActions:
      - type: zombies.map.wave.action.select_powerup
        powerups: [ "insta_kill", "health_kit" ]
  - delayTicks: 260
    spawns:
      - id: hazmat_zombie_infernal
        spawnType: window
        amount: 8
    spawnActions:
      - type: zombies.map.wave.action.select_powerup
        powerups: [ "health_kit" ]