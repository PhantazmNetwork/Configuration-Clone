    - type: npc.interactor.gui.item
      itemStack:
        material: minecraft:paper
        displayName: '<!i><b><yellow>About Sandbox Mode</yellow></b></!i>'
        lore:
          - '<!i><#f062c1><b>You need to have at least 1 recorded win</#f062c1></!i>'
          - '<!i><#f062c1><b>on the map/difficulty in order to play it in Sandbox!</#f062c1></!i>'
          - ''
          - '<!i><#f062c1>Sandbox gives you access to in-game cheat commands.</#f062c1></!i>'
          - '<!i><#f062c1>Wins in Sandbox Mode will not be recorded, player</#f062c1></!i>'
          - '<!i><#f062c1>statistics will not apply, and won''t count towards</#f062c1></!i>'
          - '<!i><#f062c1>leaderboard times. Joining Sandbox will start the game</#f062c1></!i>'
          - '<!i><#f062c1>as soon as you join, and players won''t be able to join</#f062c1></!i>'
          - '<!i><#f062c1>after. You can still join with a party, so long as every</#f062c1></!i>'
          - '<!i><#f062c1>player has at least a single win on the map/difficulty</#f062c1></!i>'
          - '<!i><#f062c1>you are joining. Alternatively, to join a sandbox game, use</#f062c1></!i>'
          - '<!i><#f062c1><i><#b8bfde>/zombies join [map] true true</#b8bfde></i>.</#f062c1></!i>'
      closeOnClick: false
      interactor:
        type: npc.interactor.none

    - type: npc.interactor.gui.item
      itemStack:
        material: minecraft:paper
        displayName: '<!i><b><yellow>Sandbox Commands</yellow></b></!i>'
        lore:
          - '<!i><#616575>»</#616575> <#f062c1>/zombies godmode</#f062c1></!i>'
          - '<!i>   <#9096ad>Makes you invincible, you can fly, and you</#9096ad></!i>'
          - '<!i>   <#9096ad>one-tap zombies by punching them</#9096ad></!i>'
          - '<!i><#616575>»</#616575> <#f062c1>/zombies ammo_refill</#f062c1></!i>'
          - '<!i>   <#9096ad>Instantly refill all of your ammo for all of your guns</#9096ad></!i>'
          - '<!i><#616575>»</#616575> <#f062c1>/zombies toggle_flag zombies.map.flag.power</#f062c1></!i>'
          - '<!i>   <#9096ad>Turns on the power for the game</#9096ad></!i>'
          - '<!i><#616575>»</#616575> <#f062c1>/zombies coins [give|take|set] [amount]</#f062c1></!i>'
          - '<!i>   <#9096ad>Gives, removes, or sets the player''s coin amount;</#9096ad></!i>'
          - '<!i>   <#9096ad>for example <i><#b8bfde>/zombies coins set 10000 to set</#b8bfde></i></#9096ad></!i>'
          - '<!i>   <#9096ad>your own coin amount to 10000</#9096ad></!i>'
          - '<!i><#616575>»</#616575> <#f062c1>/zombies killall</#f062c1></!i>'
          - '<!i>   <#9096ad>Kills every zombie in the current round and</#9096ad></!i>'
          - '<!i>   <#9096ad>advances to the next one</#9096ad></!i>'
          - '<!i><#616575>»</#616575> <#f062c1>/zombies round [round]</#f062c1></!i>'
          - '<!i>   <#9096ad>Skip to a specific round, <i><#b8bfde>/zombies round 20</#b8bfde></i></#9096ad></!i>'
          - '<!i>   <#9096ad>for example to go to round 20</#9096ad></!i>'
          - '<!i><#f062c1>More cheat commands to come in the future.</#f062c1></!i>'
      closeOnClick: false
      interactor:
        type: npc.interactor.none

