key: elephants_foot_infernal
type: minecraft:zombie
pathfinding:
  type: proxima.path_settings.ground
  jumpHeight: 2.0
  fallTolerance: 6
  stepHeight: 0.5

showNameTag: true

meta:
  customName: <green><b>Elephant's Foot</b></green>
  customNameVisible: true
  isBaby: true

extra:
  resistInstakill: true
  resistFire: true
  resistSlowDown: true
  announceKill: true

equipment:
  CHESTPLATE: '{id:"netherite_chestplate",Count:1}'
  HELMET: '{id:"player_head",Count:1,tag:{display:{Name:"{\"text\":\"Uranium\"}"},SkullOwner:{Id:[I;-1493787278,433015017,-1346187989,1673448302],Properties:{textures:[{Value:"eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvYjVhNDc1NDYwYjVmOWEzNjc3OTBkZjlkZjViYmJmYmMxMGMwNzlkNDU0OGUzMzgyZGIzNmYzMzY0ZWMwODg0NSJ9fX0="}]}}}}'

attributes:
  generic.max_health: 1750
  generic.movement_speed: 0.37
  generic.attack_damage: 7
  generic.armor: 14
  generic.attack_knockback: 0.2
  generic.knockback_resistance: 1.0
  phantazm.hitbox_expand: 0.4

skills:
  - type: mob.skill.send_message
    trigger: SPAWN
    message: <yellow><#3410ad><b>INFERNAL</b></#3410ad> <green><b>Elephant's Foot</b></green> has spawned!</yellow>
    selector:
      type: mob.selector.entities_in_area
      originSelector:
        type: mob.selector.self
      validator:
        type: mob.validator.always
      target: PLAYERS

  - type: mob.skill.play_sound
    trigger: SPAWN
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.lightning_bolt.thunder', source: PLAYER, volume: 100.0, pitch: 1.0 }

  - type: mob.skill.play_sound
    trigger: DAMAGED
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.slime.hurt', source: HOSTILE, volume: 1.2, pitch: 1.0 }

  - type: mob.skill.play_sound
    trigger: DEATH
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.slime.death', source: HOSTILE, volume: 1.2, pitch: 1.0 }

  - type: mob.skill.show_healthbar
    bar: '<#6b6f80>[<healthbar:bar_component:|:color_start:#dd3e28:color_end:#34bf25:missing_color:gray>]</#6b6f80>'
    barWidth: 20

  - type: mob.skill.timer
    interval: 5
    delegate:
      type: mob.skill.group
      delegates:
        - type: mob.skill.temporal
          minDuration: 20
          maxDuration: 20
          delegate:
            type: mob.skill.attribute_modifying
            attribute: generic.movement_speed
            amount: -1.0
            attributeOperation: MULTIPLY_TOTAL
            stage: zombies_game
            selector:
              type: mob.selector.entities_in_area
              originSelector:
                type: mob.selector.self
              range: 7
              target: LIVING_ENTITIES
              validator: /alivePlayers

goals:
  - type: mob.goal_applier.collection
    goalCreators:
      - type: zombies.mob.goal.break_window
        breakTicks: 10
        breakCount: 3
        breakRadius: 0.5

  - type: mob.goal_applier.collection
    goalCreators:
      - type: mob.goal.melee_attack
        cooldown: 20
        range: 0.25

      - type: mob.goal.follow_entity
        selector:
          type: mob.selector.entities_in_area
          originSelector:
            type: mob.selector.self
          validator: /alivePlayers
          target: PLAYERS
          limit: 1
        retargetInterval: 20
        followRange: 1024

alivePlayers:
  type: zombies.mob.validator.zombies_player
  states: [ zombies.player.state.alive ]
  blacklist: false

distanceCheck:
  type: mob.validator.distance
  distance: 15