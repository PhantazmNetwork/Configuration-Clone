key: screamer_fge
type: minecraft:zombie
tags: [ endless ]
pathfinding:
  type: proxima.path_settings.ground
  jumpHeight: 1.5
  fallTolerance: 8
  stepHeight: 1

meta:
  customName: <gray>Screamer</gray>

equipment:
  BOOTS: '{id:"chainmail_boots",Count:1}'
  LEGGINGS: '{id:"leather_leggings",Count:1,tag:{display:{color:16777215}}}'
  CHESTPLATE: '{id:"chainmail_chestplate",Count:1}'
  HELMET: '{id:"chainmail_helmet",Count:1}'

attributes:
  generic.max_health: 25
  generic.movement_speed: 0.28
  generic.attack_damage: 4
  generic.armor: 10
  generic.attack_knockback: 0.2

skills:
  - type: mob.skill.play_sound
    trigger: DAMAGED
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.zombie.hurt', source: HOSTILE, volume: 1.5, pitch: 1.4 }

  - type: mob.skill.play_sound
    trigger: DEATH
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.ghast.death', source: HOSTILE, volume: 1.5, pitch: 1.3 }

  - type: mob.skill.random_timer
    minInterval: 100
    maxInterval: 160
    delegate:
      type: mob.skill.random
      chance: 0.5
      delegate:
        type: mob.skill.play_sound
        selector:
          type: mob.selector.self
        sound: { name: 'minecraft:entity.zombie.ambient', source: HOSTILE, volume: 1.5, pitch: 1.4 }

  - type: mob.skill.random_timer
    minInterval: 130
    maxInterval: 160
    delegate:
      type: mob.skill.conditional
      condition:
        type: mob.skill.condition.boolean_tag
        selector:
          type: mob.selector.self
        tag: skill_cancel
        blacklist: true
      delegate:
        type: mob.skill.group
        delegates:
          - type: mob.skill.temporal
            minDuration: 50
            maxDuration: 50
            delegate:
              type: mob.skill.attribute_modifying
              selector:
                type: mob.selector.self
              attribute: generic.movement_speed
              amount: 0.5
              attributeOperation: ADDITION

          - type: mob.skill.temporal
            minDuration: 50
            maxDuration: 50
            delegate:
              type: mob.skill.attribute_modifying
              selector:
                type: mob.selector.self
              attribute: phantazm.attack_speed_multiplier
              amount: 1.0
              attributeOperation: ADDITION

          - type: mob.skill.play_sound
            selector:
              type: mob.selector.self
            sound: { name: 'minecraft:entity.ghast.hurt', source: HOSTILE, volume: 1.5, pitch: 1.6 }

goals:
  - type: mob.goal_applier.collection
    goalCreators:
      - type: zombies.mob.goal.break_window
        breakTicks: 20
        breakCount: 1
        breakRadius: 0.5

  - type: mob.goal_applier.collection
    goalCreators:
      - type: mob.goal.melee_attack
        cooldown: 16
        range: 0.25

      - type: mob.goal.follow_entity
        selector:
          type: mob.selector.entities_in_area
          originSelector:
            type: mob.selector.self
          validator:
            type: mob.validator.or
            validators: [ /alivePlayers, /targetableMobs ]
          target: LIVING_ENTITIES
          limit: 1
        retargetInterval: 20
        followRange: 1024

alivePlayers:
  type: zombies.mob.validator.zombies_player
  states: [ zombies.player.state.alive ]
  blacklist: false

targetableMobs:
  type: mob.validator.mob_type
  tags: [ ally_targetable ]
  blacklist: false
