round: 15
startActions:
  - type: zombies.map.round.action.announce
    format: <red>Round <round>
    destination: TITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.announce
    format: ""
    destination: SUBTITLE
    tickFormatter:
      type: core.tick_formatter.analog
      ceil: false

  - type: zombies.map.round.action.revive_players

  - type: zombies.map.round.action.play_sound
    sound: { name: 'minecraft:entity.wither.spawn', source: MASTER, volume: 24.0,
             pitch: 0.5 }
endActions: [ ]
# 48
waves:
  - delayTicks: 140
    spawns:
      - id: mutant
        spawnType: window
        amount: 1
      - id: decaying_wolf
        spawnType: window
        amount: 8
      - id: spitter
        spawnType: window
        amount: 8
    spawnActions: [ ]
  - delayTicks: 230
    spawns:
      - id: decaying_wolf
        spawnType: window
        amount: 8
      - id: spitter
        spawnType: window
        amount: 6
    spawnActions: [ ]
  - delayTicks: 230
    spawns:
      - id: mutant
        spawnType: window
        amount: 1
      - id: decaying_wolf
        spawnType: window
        amount: 8
      - id: spitter
        spawnType: window
        amount: 8
    spawnActions:
      - type: zombies.map.wave.action.select_powerup
        powerups: [ "max_ammo" ]