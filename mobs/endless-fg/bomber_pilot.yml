key: bomber_pilot_fge
type: minecraft:husk
tags: [ endless, boss, debuff]
pathfinding:
  type: proxima.path_settings.ground
  jumpHeight: 1.25
  fallTolerance: 4
  stepHeight: 0.5

showNameTag: true

meta:
  customName: <#9ca0b7><b>Bomber Pilot</b></#9ca0b7>
  customNameVisible: true

extra:
  resistInstakill: true
  announceKill: true
  endlessHealthScaling:
    kind: LINEAR
    ceiling: 2147483647
    a: 5

equipment:
  BOOTS: '{id:"iron_boots",Count:1}'
  LEGGINGS: '{id:"diamond_leggings",Count:1}'
  CHESTPLATE: '{id:"iron_chestplate",Count:1}'
  HELMET: '{id:"player_head",Count:1,tag:{display:{Name:"{\"text\":\"Pilot\"}"},SkullOwner:{Id:[I;453272368,-520861051,-2069149995,1906900287],Properties:{textures:[{Value:"eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvNmJhMzcxZmRlNjg3NmRlNjk1ZTc3NjgwYWZmZjkzZWU2OTM4NDc4NjY2NWJhOTJiZDUzMjY5ZTA4ZGUyNGY0NCJ9fX0="}]}}}}'

attributes:
  generic.max_health: 800
  generic.movement_speed: 0.22
  generic.attack_damage: 8
  generic.armor: 14
  generic.attack_knockback: 0.2
  generic.knockback_resistance: 0.5

skills:
  - type: mob.skill.send_message
    trigger: SPAWN
    message: <yellow><#9ca0b7><b>Bomber Pilot</b></#9ca0b7> has spawned!</yellow>
    selector:
      type: mob.selector.entities_in_area
      originSelector:
        type: mob.selector.self
      validator:
        type: mob.validator.always
      target: PLAYERS

  - type: mob.skill.play_sound
    trigger: SPAWN
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.lightning_bolt.thunder', source: PLAYER, volume: 100.0, pitch: 1.0 }

  - type: mob.skill.play_sound
    trigger: DAMAGED
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.husk.hurt', source: HOSTILE, volume: 1.5, pitch: 0.75 }

  - type: mob.skill.conditional
    trigger: DAMAGED
    condition:
      type: mob.skill.condition.health
      selector:
        type: mob.selector.self
      condition: LESS_THAN
      amountType: PERCENTAGE
      amount: 0.9
    delegate:
      type: mob.skill.spawn_mob
      selector:
        type: mob.selector.self
      callback:
        type: zombies.mob.skill.spawn_mob.callback.add_to_round
      identifier: phantazm:bomber_squad_fge
      spawnAmount: 2
      maxSpawn: 20
      instanceCountKey: 'bomber_squad_fge_spawn'

  - type: mob.skill.conditional
    trigger: DAMAGED
    condition:
      type: mob.skill.condition.health
      selector:
        type: mob.selector.self
      condition: LESS_THAN
      amountType: PERCENTAGE
      amount: 0.75
    delegate:
      type: mob.skill.spawn_mob
      selector:
        type: mob.selector.self
      callback:
        type: zombies.mob.skill.spawn_mob.callback.add_to_round
      identifier: phantazm:bomber_squad_fge
      spawnAmount: 1
      maxSpawn: 20
      instanceCountKey: 'bomber_squad_fge_spawn'

  - type: mob.skill.conditional
    trigger: DAMAGED
    condition:
      type: mob.skill.condition.health
      selector:
        type: mob.selector.self
      condition: LESS_THAN
      amountType: PERCENTAGE
      amount: 0.5
    delegate:
      type: mob.skill.spawn_mob
      selector:
        type: mob.selector.self
      callback:
        type: zombies.mob.skill.spawn_mob.callback.add_to_round
      identifier: phantazm:bomber_squad_fge
      spawnAmount: 1
      maxSpawn: 20
      instanceCountKey: 'bomber_squad_fge_spawn'

  - type: mob.skill.conditional
    trigger: DAMAGED
    condition:
      type: mob.skill.condition.health
      selector:
        type: mob.selector.self
      condition: LESS_THAN
      amountType: PERCENTAGE
      amount: 0.25
    delegate:
      type: mob.skill.spawn_mob
      selector:
        type: mob.selector.self
      callback:
        type: zombies.mob.skill.spawn_mob.callback.add_to_round
      identifier: phantazm:bomber_squad_fge
      spawnAmount: 4
      maxSpawn: 20
      instanceCountKey: 'bomber_squad_fge_spawn'

  - type: mob.skill.play_sound
    trigger: DEATH
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.husk.death', source: HOSTILE, volume: 1.5, pitch: 0.75 }

  - type: mob.skill.show_healthbar
    bar: '<#6b6f80>[<healthbar:bar_component:|:color_start:#dd3e28:color_end:#34bf25:missing_color:gray>]</#6b6f80>'
    barWidth: 20

  - type: mob.skill.random_timer
    minInterval: 100
    maxInterval: 160
    delegate:
      type: mob.skill.random
      chance: 0.5
      delegate:
        type: mob.skill.play_sound
        selector:
          type: mob.selector.self
        sound: { name: 'minecraft:entity.husk.ambient', source: HOSTILE, volume: 1.5, pitch: 0.75 }

  - type: mob.skill.random_timer
    minInterval: 150
    maxInterval: 180
    delegate:
      type: mob.skill.group
      delegates:
        - type: mob.skill.temporal
          minDuration: 40
          maxDuration: 40
          delegate:
            type: mob.skill.attribute_modifying
            attribute: generic.movement_speed
            amount: -0.12
            attributeOperation: ADDITION
            selector:
              type: mob.selector.self

        - type: mob.skill.timer
          interval: 40
          requiresActivation: true
          repeat: 1
          delegate:
            type: mob.skill.shoot_projectile
            selector:
              type: mob.selector.pathfinding_target
            hitValidator:
              type: mob.validator.and
              validators: [ /alivePlayers, /distanceCheck ]
            callback:
              type: mob.skill.spawn_mob.callback.none
            entity: rpg_mob
            power: 2
            spread: 0
            gravity: false

  - type: mob.skill.timer
    interval: 40
    delegate:
      type: mob.skill.group
      delegates:
        - type: mob.skill.play_sound
          selector:
            type: mob.selector.self
          sound: { name: 'minecraft:entity.wither.shoot', source: HOSTILE, volume: 2.0, pitch: 1.0 }

        - type: mob.skill.timer
          interval: 40
          requiresActivation: true
          repeat: 1
          delegate:
            type: mob.skill.group
            delegates:
              - type: mob.skill.lingering
                selector:
                  type: mob.selector.entities_in_area
                  originSelector:
                    type: mob.selector.self
                  range: 16
                  target: LIVING_ENTITIES
                  validator: /mobValidator
                  limit: 1
                targetSkills:
                  - type: mob.skill.timer
                    interval: 3
                    delegate:
                      type: mob.skill.spawn_particle
                      selector:
                        type: mob.selector.self
                      particle:
                        type: particle.wrapper
                        particle: campfire_cosy_smoke
                        variantData:
                          type: particle.variant_data.none
                        distance: false
                        offsetX: 2.5
                        offsetY: 0.5
                        offsetZ: 2.5
                        data: 0.0
                        particleCount: 4
                      bounds:
                        origin:
                          x: -2.5
                          y: 0.0
                          z: -2.5
                        lengths:
                          x: 5.0
                          y: 0.0
                          z: 5.0
                  - type: mob.skill.timer
                    interval: 60
                    delegate:
                      type: mob.skill.group
                      delegates:
                        - type: mob.skill.temporal
                          minDuration: 60
                          maxDuration: 60
                          delegate:
                            type: mob.skill.attribute_modifying
                            selector:
                              type: mob.selector.entities_in_area
                              originSelector:
                                type: mob.selector.self
                              range: 5
                              target: PLAYERS
                              validator: /alivePlayers
                            attribute: generic.movement_speed
                            amount: -0.5
                            attributeOperation: MULTIPLY_BASE
                            stage: zombies_game

                        - type: mob.skill.temporal
                          minDuration: 60
                          maxDuration: 60
                          delegate:
                            type: mob.skill.attribute_modifying
                            selector:
                              type: mob.selector.entities_in_area
                              originSelector:
                                type: mob.selector.self
                              range: 5
                              target: PLAYERS
                              validator: /alivePlayers
                            attribute: phantazm.gun_fire_delay
                            amount: 0.5
                            attributeOperation: MULTIPLY_BASE
                            stage: zombies_game
                lifetime: 180

              - type: mob.skill.damage
                selector:
                  type: mob.selector.entities_in_area
                  originSelector:
                    type: mob.selector.self
                  range: 16
                  target: LIVING_ENTITIES
                  validator: /mobValidator
                  limit: 1
                amount: 10000
                damageType: damage.explosion
                bypassArmor: true

              - type: mob.skill.play_sound
                selector:
                  type: mob.selector.self
                sound: { name: 'minecraft:entity.generic.explode', source: HOSTILE, volume: 2.0, pitch: 1.0 }

goals:
  - type: mob.goal_applier.collection
    goalCreators:
      - type: zombies.mob.goal.break_window
        breakTicks: 20
        breakCount: 1
        breakRadius: 0.5

  - type: mob.goal_applier.collection
    goalCreators:
      - type: mob.goal.melee_attack
        cooldown: 20
        range: 0.25

      - type: mob.goal.follow_entity
        selector:
          type: mob.selector.entities_in_area
          originSelector:
            type: mob.selector.self
          validator:
            type: mob.validator.or
            validators: [ /alivePlayers, /targetableMobs ]
          target: LIVING_ENTITIES
          limit: 1
        retargetInterval: 20
        followRange: 1024

alivePlayers:
  type: zombies.mob.validator.zombies_player
  states: [ zombies.player.state.alive ]
  blacklist: false

targetableMobs:
  type: mob.validator.mob_type
  tags: [ ally_targetable ]
  blacklist: false

distanceCheck:
  type: mob.validator.distance
  distance: 15

mobValidator:
  type: mob.validator.mob_type
  types: [ bomber_squad_fge ]
  blacklist: false