key: paramedic
type: minecraft:zombie
tags: [ boss ]
pathfinding:
  type: proxima.path_settings.ground
  jumpHeight: 1.25
  fallTolerance: 4
  stepHeight: 0.5

showNameTag: true

meta:
  customName: <dark_red><b>Paramedic</b></dark_red>
  customNameVisible: true

extra:
  resistInstakill: true
  announceKill: true
  endlessHealthScaling:
    kind: LINEAR
    ceiling: 2147483647
    a: 5

equipment:
  MAIN_HAND: '{id:"iron_ingot",Count:1}'
  OFF_HAND: '{id:"iron_ingot",Count:1}'
  BOOTS: '{id:"iron_boots",Count:1}'
  LEGGINGS: '{id:"iron_leggings",Count:1}'
  CHESTPLATE: '{id:"leather_chestplate",Count:1,tag:{display:{color:13893376}}}'
  HELMET: '{id:"player_head",Count:1,tag:{display:{Name:"{\"text\":\"Paramedic\"}"},SkullOwner:{Id:[I;1129420210,-800505246,-1715160731,-914998491],Properties:{textures:[{Value:"eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvMjNlMDhkMDk2ZjI4ZTUzOTg3Y2MxMmMwNzhlMzFkZWYxODk3ZWVlNDMyYmE4N2I4OTY5ZWI4ZjRlMTIwNWZjNyJ9fX0="}]}}}}'

attributes:
  generic.max_health: 300
  generic.movement_speed: 0.27
  generic.attack_damage: 4
  generic.armor: 8
  generic.attack_knockback: 0.2
  generic.knockback_resistance: 0.95

skills:
  - type: mob.skill.send_message
    trigger: SPAWN
    message: <yellow><dark_red><b>Paramedic</b></dark_red> has spawned!</yellow>
    selector:
      type: mob.selector.entities_in_area
      originSelector:
        type: mob.selector.self
      validator:
        type: mob.validator.always
      target: PLAYERS

  - type: mob.skill.play_sound
    trigger: SPAWN
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.lightning_bolt.thunder', source: PLAYER, volume: 100.0, pitch: 1.0 }

  - type: mob.skill.play_sound
    trigger: DAMAGED
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.zombie.hurt', source: HOSTILE, volume: 1.5, pitch: 1.0 }

  - type: mob.skill.play_sound
    trigger: DEATH
    selector:
      type: mob.selector.self
    sound: { name: 'minecraft:entity.zombie.death', source: HOSTILE, volume: 1.5, pitch: 1.0 }

  - type: mob.skill.show_healthbar
    bar: '<#6b6f80>[<healthbar:bar_component:|:color_start:#dd3e28:color_end:#34bf25:missing_color:gray>]</#6b6f80>'
    barWidth: 20

  - type: mob.skill.random_timer
    minInterval: 100
    maxInterval: 160
    delegate:
      type: mob.skill.random
      chance: 0.5
      delegate:
        type: mob.skill.play_sound
        selector:
          type: mob.selector.self
        sound: { name: 'minecraft:entity.zombie.ambient', source: HOSTILE, volume: 1.5, pitch: 1.0 }

  - type: mob.skill.timer
    interval: 200
    delegate:
      type: mob.skill.group
      delegates:
        - type: mob.skill.play_sound
          selector:
            type: mob.selector.self
          sound: { name: 'minecraft:block.anvil.land', source: HOSTILE, volume: 2.0, pitch: 1.3 }

        - type: mob.skill.timer
          repeat: 1
          interval: 20
          requiresActivation: true
          delegate:
            type: mob.skill.play_sound
            selector:
              type: mob.selector.self
            sound: { name: 'minecraft:block.anvil.land', source: HOSTILE, volume: 2.0, pitch: 1.7 }

        - type: mob.skill.timer
          repeat: 1
          interval: 40
          requiresActivation: true
          delegate:
            type: mob.skill.play_sound
            selector:
              type: mob.selector.self
            sound: { name: 'minecraft:block.anvil.land', source: HOSTILE, volume: 2.0, pitch: 2.0 }

        - type: mob.skill.timer
          repeat: 1
          interval: 60
          requiresActivation: true
          delegate:
            type: mob.skill.group
            delegates:
              - type: mob.skill.damage
                selector:
                  type: mob.selector.entities_in_area
                  originSelector:
                    type: mob.selector.self
                  range: 5
                  target: PLAYERS
                  validator: /alivePlayers
                amount: 8
                bypassArmor: true

              - type: mob.skill.play_sound
                selector:
                  type: mob.selector.self
                sound: { name: 'minecraft:entity.lightning_bolt.thunder', source: HOSTILE, volume: 2.0, pitch: 1.0 }

              - type: mob.skill.spawn_particle
                selector:
                  type: mob.selector.self
                particle:
                  type: particle.wrapper
                  particle: enchanted_hit
                  variantData:
                    type: particle.variant_data.none
                  distance: false
                  offsetX: 2.5
                  offsetY: 0
                  offsetZ: 2.5
                  data: 0.0
                  particleCount: 30
                bounds:
                  origin:
                    x: 0.0
                    y: 0.5
                    z: 0.0
                  lengths:
                    x: 0.0
                    y: 0.0
                    z: 0.0

goals:
  - type: mob.goal_applier.collection
    goalCreators:
      - type: zombies.mob.goal.break_window
        breakTicks: 20
        breakCount: 1
        breakRadius: 0.5

  - type: mob.goal_applier.collection
    goalCreators:
      - type: mob.goal.melee_attack
        cooldown: 20
        range: 0.25

      - type: mob.goal.follow_entity
        selector:
          type: mob.selector.entities_in_area
          originSelector:
            type: mob.selector.self
          validator:
            type: mob.validator.or
            validators: [ /alivePlayers, /targetableMobs ]
          target: LIVING_ENTITIES
          limit: 1
        retargetInterval: 20
        followRange: 1024

alivePlayers:
  type: zombies.mob.validator.zombies_player
  states: [ zombies.player.state.alive ]
  blacklist: false

targetableMobs:
  type: mob.validator.mob_type
  tags: [ ally_targetable ]
  blacklist: false